// ── REPORT HELPERS ────────────────────────────────────────────────────────────
function dayReport(dayEntries,medPresets){
  const mp=medPresets||FD.medicalPresets||[];
  const WTYP=["Warm Water","Plain Water","Cold Water"];
  const liqs=dayEntries.filter(e=>e.type==="liquid");
  const waters=liqs.filter(e=>WTYP.includes(e.liquidType));
  const nonW=liqs.filter(e=>!WTYP.includes(e.liquidType));
  const totalW=waters.reduce((s,e)=>s+(+e.ml||0),0);
  const waterStr=totalW?`${totalW}ml (${[...new Set(waters.map(e=>e.liquidType))].join("/")})`:`-`;
  const drinksStr=nonW.map(e=>`${e.liquidType}${e.ml?" "+e.ml+"ml":""}${e.notes?" ("+e.notes+")":""}`).join("; ")||"-";
  const ex=dayEntries.filter(e=>e.type==="exercise").map(e=>{let s=e.exType;if(e.dist)s+=` ${e.dist}km`;if(e.time)s+=` ${e.time}min`;if(e.count)s+=` x${e.count}`;return s;}).join("; ")||"-";
  const meds=dayEntries.filter(e=>e.type==="medication").map(e=>`${e.med}(${e.timing})`).join("; ")||"-";
  const meals={};["Breakfast","Lunch","Dinner","Snack"].forEach(mt=>{meals[mt]=dayEntries.filter(e=>e.type==="meal"&&e.mealType===mt).map(e=>e.unit==="count"?`${e.food} ${e.qty}`:`${e.food} ${e.qty}${e.unit}`).join(", ")||"-";});
  const medR={};mp.forEach(p=>{const nm=p.name||p;medR[nm]=dayEntries.filter(e=>e.type==="medical"&&e.readingType===nm).map(e=>`${e.value}${e.unit?" "+e.unit:""}`).join(", ")||"-";});
  return{water:waterStr,drinks:drinksStr,medication:meds,exercise:ex,...meals,...medR};
}

function buildAllCSV(entries){
  const hdr=["ID","Date","Time","Type","SubType","Detail1","Detail2","Detail3","Unit","Notes","Deleted","DeletedAt"];
  const rows=[...entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(e=>{
    let t="",st="",d1="",d2="",d3="",u="",n=e.notes||"";
    if(e.type==="meal")      {t="Meal";st=e.mealType;d1=e.food+(e.foodSubType?" · "+e.foodSubType:"");d2=e.qty;u=e.unit;}
    if(e.type==="liquid")    {t="Drinks";st=(e.liquidType||"")+(e.liquidSubType?" · "+e.liquidSubType:"");d1=e.ml||"";u="ml";}
    if(e.type==="exercise")  {t="Exercise";st=e.exType;d1=e.subType||"";d2=e.dist||"";d3=e.time||e.count||"";u=e.dist?"km":e.count?"count":"min";}
    if(e.type==="medical")   {t="Medical";st=e.readingType;d1=e.value;u=e.unit||"";}
    if(e.type==="medication"){t="Medication";st=e.med;d1=e.timing;}
    return[e.id,normDate(e.date),fmt24(e.timestamp),t,st,d1,d2,d3,u,n,e.deleted?"YES":"",e.deletedAt||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",");
  });
  return[hdr.join(","),...rows].join("\n");
}

function buildViewCSV(entries,dates,medPresets){

  const rows=[
    {key:"water",label:"Water"},{key:"drinks",label:"Drinks"},{key:"medication",label:"Medications"},{key:"exercise",label:"Exercise"},

  return[hdr,...dataRows].join("\n");
}

// ── CSV IMPORT ────────────────────────────────────────────────────────────────
function parseAndMergeCSV(csvText,existingEntries){
  const lines=csvText.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)throw new Error("Empty file");
  const hdrs=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  ["Date","Time","Type"].forEach(r=>{if(!hdrs.includes(r))throw new Error(`Missing column: ${r}`);});
  const col=k=>hdrs.indexOf(k);
  const cell=(row,k)=>{const v=row[col(k)]||"";return v.replace(/^"|"$/g,"").replace(/""/g,'"').trim();};
  const existingIds=new Set(existingEntries.map(e=>e.id));
  const imported=[];
  for(let i=1;i<lines.length;i++){
    const row=[];let cur="",inQ=false;
    for(const ch of lines[i]+","){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){row.push(cur);cur="";}else cur+=ch;}
    const rawId=cell(row,"ID");const id=rawId||[cell(row,"Date"),cell(row,"Time"),cell(row,"Type"),cell(row,"SubType"),cell(row,"Detail1"),String(i)].join("|").replace(/[\s.#$\[\]/]/g,"_");if(!cell(row,"Date")||!cell(row,"Type"))continue;
    if(rawId&&existingIds.has(id))continue;
    // Natural key = date+time+type+subtype — used to deduplicate re-imports
    const nk=[cell(row,"Date"),cell(row,"Time"),cell(row,"Type"),cell(row,"SubType")].join("|");
    const dateStr=cell(row,"Date");const timeStr=cell(row,"Time")||"00:00";
    const type=cell(row,"Type").toLowerCase();
    const subType=cell(row,"SubType");const d1=cell(row,"Detail1")||cell(row,"T");const d2=cell(row,"Detail2");const d3=cell(row,"Detail3");const unit=cell(row,"Unit");const notes=cell(row,"Notes");
    const parsedDate=(()=>{
      // Handle "DD Mon YYYY" e.g. "1 Mar 2026" (diary format)
      const monMatch=dateStr.match(/^(\d{1,2})\s+(\w+)\s+(\d{4})$/);
      if(monMatch){const mi=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].indexOf(monMatch[2].slice(0,3));if(mi>=0)return`${monMatch[3]}-${String(mi+1).padStart(2,"0")}-${monMatch[1].padStart(2,"0")}`;}
      return normDate(dateStr); // handles DD-MM-YY, DD-MM-YYYY, YYYY-MM-DD
    })();
    const ts=makeTS(parsedDate,timeStr);
    let entry={id,date:parsedDate,timestamp:ts,notes};
    if(type==="meal")       entry={...entry,type:"meal",mealType:subType,food:d1,qty:d2,unit};
    else if(type==="drinks")entry={...entry,type:"liquid",liquidType:subType,liquidSubType:"",ml:+d1||0,notes};
    else if(type==="exercise")entry={...entry,type:"exercise",exType:subType,subType:d1,dist:d2,time:d3,count:d3,unit};
    else if(type==="water"||type==="liquid") entry={...entry,type:"liquid",liquidType:subType||"Warm Water",ml:+d1||0,notes};
    else if(type==="medical")entry={...entry,type:"medical",readingType:subType,value:d1,unit};
    else if(type==="medication")entry={...entry,type:"medication",med:subType,timing:d1};
    else continue;
    imported.push(entry);
  }
  return imported;
}

// ── DOWNLOAD ──────────────────────────────────────────────────────────────────
function downloadCSV(csv,filename){
  try{const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.setAttribute("download",filename);document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);}catch(e){alert("Download failed: "+e.message);}
}

function LoginScreen({error}){
  const[loading,setLoading]=useState(false);
  const[localError,setLocalError]=useState(null);
  const signIn=async()=>{
    if(!navigator.onLine){setLocalError("No internet connection. The first sign-in needs network — please try again once you're back online.");return;}
    setLoading(true);setLocalError(null);
    try{
      await Promise.race([
        fbAuth.signInWithPopup(googleProvider),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("Sign-in timed out — check your connection and try again.")),15000))
      ]);
    }catch(e){setLocalError(e.message);}
    finally{setLoading(false);}
  };
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628",gap:24,padding:24}}><img src={LOGO_SVG} style={{width:80,height:80,borderRadius:20}} alt="JivanLog"/><div style={{textAlign:"center"}}><div style={{color:"#00e676",fontWeight:700,fontSize:"1.6rem",letterSpacing:"0.04em",fontFamily:"system-ui"}}>JivanLog</div><div style={{color:"#4a7fa5",fontSize:"0.85rem",marginTop:4}}>Personal health tracker</div></div>{(error||localError)&&<div style={{color:"#ef5350",fontSize:"0.8rem",textAlign:"center",padding:"8px 14px",background:"#ef535018",borderRadius:8,border:"1px solid #ef535044"}}>{error||localError}</div>}<button onClick={signIn} disabled={loading} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 28px",borderRadius:12,border:"none",background:"#ffffff",color:"#1c2e42",fontFamily:"system-ui",fontSize:"1rem",fontWeight:600,cursor:loading?"wait":"pointer",opacity:loading?0.7:1,minWidth:220,justifyContent:"center",boxShadow:"0 4px 20px #00000044"}}><svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>{loading?"Signing in…":"Sign in with Google"}</button><div style={{color:"#2a4a6a",fontSize:"0.72rem",textAlign:"center",maxWidth:260,lineHeight:1.6}}>Your data is stored privately in Firebase.<br/>Only you can access your entries.</div></div>);
}
function LoadingScreen({message="Loading JivanLog…"}){
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628",flexDirection:"column",gap:16}}><img src={LOGO_SVG} style={{width:64,height:64,borderRadius:14}} alt="JivanLog"/><span style={{color:"#00e676",fontSize:"1.05rem",fontFamily:"monospace",letterSpacing:"0.05em"}}>{message}</span><div style={{width:120,height:3,background:"#1e3a5f",borderRadius:2,overflow:"hidden",marginTop:4}}><div style={{height:"100%",background:"#00e676",borderRadius:2,animation:"jlb 1.8s ease-in-out infinite"}}/></div><style>{"@keyframes jlb{0%{width:0%;margin-left:0}60%{width:80%;margin-left:0}100%{width:0%;margin-left:100%}}"}</style></div>);
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════
function App(){
  const[authState,setAuthState]=useState("checking");
  const[authError,setAuthError]=useState(null);
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("home");
  const[locked,setLocked]=useState(false);
  const[entries,setEntries]=useState([]);
  const[deletedEntries,setDeletedEntries]=useState([]);
  const[settings,setSettings]=useState(deepClone(FD));
  const[defaults,setDefaults]=useState(deepClone(FD));
  const[theme,setTheme]=useState("system");
  const[dayRolloverMin,setDayRolloverMinR]=useState(DAY_ROLLOVER_MIN);
  const[dataLoaded,setDataLoaded]=useState(false);
  const[clock,setClock]=useState(nowTime());
  const[entryTime,setEntryTime]=useState(nowHHMM());
  const[syncStatus,setSyncStatus]=useState("idle");
  const[showUserMenu,setShowUserMenu]=useState(false);
  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const isOnlineRef=useRef(navigator.onLine);
  const[queueSize,setQueueSize]=useState(0);
  const[offlineAuth,setOfflineAuth]=useState(false);
  const deliberateClearRef=useRef(false);
  const entriesRef=useRef(null);

  const T=theme==="system"?THEMES[sysDark()?"dark":"light"]:(THEMES[theme]||THEMES.dark);

  useEffect(()=>{const t=setInterval(()=>setClock(nowTime()),1000);return()=>clearInterval(t);},[]);

  // ── Auto-backup: once per calendar day on first open ─────────────────────
  useEffect(()=>{
    if(!dataLoaded||!user||!entries.length)return;
    try{
      const key=`jivanlog-lastBackup-${user.uid}`;
      const last=localStorage.getItem(key);
      if(last===today())return;          // already backed up today
      const all=[...entries,...deletedEntries];
      downloadCSV(buildAllCSV(all),`jivanlog-autobackup-${today()}.csv`);
      // Also drop a lossless JSON alongside the CSV (full fidelity, incl. tombstones).
      try{const blob=new Blob([buildFullJSON(all)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`jivanlog-autobackup-${today()}.json`;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1200);}catch(e){}
      localStorage.setItem(key,today());
    }catch(e){console.warn("Auto-backup failed:",e);}
  },[dataLoaded,user]);  // intentionally omit entries — run once when data first loads

  // On sign-in: hydrate from localStorage before Firebase data arrives
  useEffect(()=>{
    if(!user)return;
    const uid=user.uid;
    try{
      const cs=localStorage.getItem(`jivanlog-settingsCache-${uid}`);
      if(cs){const s=JSON.parse(cs);setSettings(s);}
      const cd=localStorage.getItem(`jivanlog-defaultsCache-${uid}`);
      if(cd){const d=JSON.parse(cd);setDefaults(d);}
    }catch(e){}
    try{
      // Hydrate from the FULL local mirror (all history incl. tombstones), so
      // offline boot shows everything and a write can never clobber unseen data.
      const mirror=getMirror(uid).map(e=>({...e,date:normDate(e.date)}));
      const live=mirror.filter(e=>!e.deleted);
      const dead=mirror.filter(e=>e.deleted);
      const queued=getOfflineQ(uid);
      const lIds=new Set(live.map(e=>e.id));
      const merged=[...live,...queued.filter(e=>!lIds.has(e.id)&&!e.deleted).map(e=>({...e,date:normDate(e.date)}))];
      setEntries(merged);
      setDeletedEntries(dead);
      setDataLoaded(true);
    }catch(e){}
    setQueueSize(getOfflineQ(uid).length);
  },[user]);

  // .info/connected — authoritative connectivity source of truth
  useEffect(()=>{
    if(!user)return;
    const ref=fbDb.ref('.info/connected');
    const handler=snap=>{const v=snap.val()===true;setIsOnline(v);isOnlineRef.current=v;};
    ref.on('value',handler);
    return()=>ref.off('value',handler);
  },[user]);

  // Auth listener — with OFFLINE LOGIN fallback.
  // Firebase Auth needs the network to restore/refresh a session when something
  // (e.g. App Check enforcement) forces a token round-trip. If we're offline but
  // the user has signed in before, we let them into the app using a cached
  // identity: they see their mirrored data and can keep logging (queued locally).
  // When connectivity + real auth return, the real user replaces the offline one
  // and the queue flushes automatically.
  useEffect(()=>{
    let resolved=false;
    const goOfflineSession=()=>{
      if(resolved)return;
      const cu=getCachedAuthUser();
      if(cu&&!navigator.onLine){
        resolved=true;
        setUser({uid:cu.uid,displayName:cu.displayName,email:cu.email,photoURL:cu.photoURL,_offline:true});
        setOfflineAuth(true);
        setAuthState("in");
      }else{
        setAuthState(prev=>prev==="checking"?"out":prev);
      }
    };
    const unsub=fbAuth.onAuthStateChanged(u=>{
      if(u){
        resolved=true;
        setOfflineAuth(false);
        saveCachedAuthUser(u);
        setUser(u);setAuthState("in");
      }else{
        // No real session. Offline + previously signed in → offline session.
        // Otherwise it's a genuine signed-out state.
        if(!navigator.onLine&&getCachedAuthUser()){goOfflineSession();}
        else{resolved=true;setOfflineAuth(false);setUser(null);setAuthState("out");setDataLoaded(false);setEntries([]);}
      }
    },e=>{setAuthError(e.message);if(!navigator.onLine&&getCachedAuthUser())goOfflineSession();else setAuthState("out");});
    // Fallback: if auth never resolves at all (stalled offline), open offline session after 4s.
    const t=setTimeout(goOfflineSession,4000);
    return()=>{unsub();clearTimeout(t);};
  },[]);

  // Real-time entries listener — READ-ONLY.
  // It NEVER writes to Firebase and NEVER clears the offline queue. (The old
  // version cleared the queue when Firebase's optimistic echo made a pending
  // write "appear" synced — that was the lift-bug data-loss path.) The queue is
  // now owned solely by addEntry (push) and flushOfflineQueue (remove on a
  // CONFIRMED server write). This listener only reads, merges the queue for
  // display, and refreshes the durable local mirror.
  useEffect(()=>{
    if(!user||user._offline){if(entriesRef.current){entriesRef.current();entriesRef.current=null;}return;}
    const uid=user.uid;
    const ref=fbDb.ref(`users/${uid}/entries`);
    const handler=snap=>{
      const queued=getOfflineQ(uid);
      const raw=snap.val()?Object.values(snap.val()):[];
      const fromFb=raw.map(e=>({...e,date:normDate(e.date)}));
      const mirrorAll=getMirror(uid).map(e=>({...e,date:normDate(e.date)}));
      // CONTENT decides, never a connection flag. Append-only means the server
      // can never legitimately shrink to empty. If the snapshot is empty (offline
      // cold cache, transient glitch) but we hold a mirror, keep the mirror and
      // do NOT overwrite it. This is what prevents both the blank-screen bug and
      // any empty-overwrite.
      let all;
      if(fromFb.length===0&&mirrorAll.length>0){
        all=mirrorAll; // preserve; do not touch durable copies
      }else{
        all=fromFb;
        saveMirror(uid,fromFb);          // authoritative server set (incl. tombstones)
        maybeDailyBackup(uid,fromFb);
      }
      const live=all.filter(e=>!e.deleted);
      const dead=all.filter(e=>e.deleted);
      const liveIds=new Set(live.map(e=>e.id));
      const pendingLive=queued.filter(e=>!liveIds.has(e.id)&&!e.deleted).map(e=>({...e,date:normDate(e.date)}));
      setEntries([...live,...pendingLive]);
      setDeletedEntries(dead);
      setDataLoaded(true);
    };
    ref.on("value",handler);
    entriesRef.current=()=>ref.off("value",handler);
    return()=>{ref.off("value",handler);entriesRef.current=null;};
  },[user]);

  // Load settings/templates once on sign-in
  useEffect(()=>{
    if(!user)return;
    (async()=>{
      try{
        const[sett,defs,th,dr]=await Promise.all([
          fbDb.ref(`users/${user.uid}/settings`).get(),
          fbDb.ref(`users/${user.uid}/defaults`).get(),
          fbDb.ref(`users/${user.uid}/theme`).get(),
          fbDb.ref(`users/${user.uid}/dayRolloverMin`).get(),
        ]);
        // Helper: normalise a settings/defaults object
          const norm=o=>{
            if(!o)return o;
            if(o.foodCategories)
              o.foodCategories=o.foodCategories.map(f=>typeof f==="string"?{name:f,note:"",subTypes:[],icon:""}:{note:"",icon:"",...f});
            if(o.exerciseTypes)
              o.exerciseTypes=o.exerciseTypes.map(e=>{
                if(typeof e==="string")return{name:e,metrics:["time"],note:"",subTypes:[],icon:""};
                // Firebase may return array as object {0:"time",1:"distance"} — convert back
                let m=e.metrics;
                if(m&&!Array.isArray(m))m=Object.values(m);
                if(!m||!m.length){
                  // Fall back to FD metrics for known exercise types
                  const fd=(FD.exerciseTypes||[]).find(f=>f.name===e.name);
                  m=fd?fd.metrics:["time"];
                }
                return{...e,metrics:m,note:e.note||"",icon:e.icon||""};
              });
            if(o.medicalPresets)
              o.medicalPresets=o.medicalPresets.map(p=>typeof p==="string"?{name:p,unit:"",icon:""}:{icon:"",...p});
            return o;
          };
          const s=sett.exists()?norm(sett.val()):null;
          const d=defs.exists()?norm(defs.val()):null;
          if(d)setDefaults(d);
          let settingsToCache=null;
          if(s){
            const merged=d?{...s,
              foodCategories:d.foodCategories||s.foodCategories,
              liquidTypes:d.liquidTypes||s.liquidTypes,
              liquidNotes:{...( s.liquidNotes||{}), ...(d.liquidNotes||{})},
              liquidSubTypes:{...(s.liquidSubTypes||{}),...(d.liquidSubTypes||{})},
              liquidIcons:{...(s.liquidIcons||{}),...(d.liquidIcons||{})},
              exerciseTypes:d.exerciseTypes||s.exerciseTypes,
              medicalPresets:d.medicalPresets||s.medicalPresets,
              medications:d.medications||s.medications,
              medicationIcons:{...(s.medicationIcons||{}),...(d.medicationIcons||{})},
            }:s;
            setSettings(merged);
            settingsToCache=merged;
          } else if(d){
            setSettings(deepClone(d));
            settingsToCache=deepClone(d);
          }
          // Cache for offline boot
          const uid=user.uid;
          if(settingsToCache)try{localStorage.setItem(`jivanlog-settingsCache-${uid}`,JSON.stringify(settingsToCache));}catch(e){}
          if(d)try{localStorage.setItem(`jivanlog-defaultsCache-${uid}`,JSON.stringify(d));}catch(e){}
          if(th.exists())setTheme(th.val());
          if(dr.exists()){setDayRolloverMinR(dr.val());setDayRolloverCache(dr.val());}
      }catch(e){console.error("Settings load:",e);}
    })();
  },[user]);

  // Daily safety snapshot — small copy of TODAY's entries, overwritten each day.
  // Local copy is instant; backend copy lives in a SEPARATE Firebase node
  // (users/{uid}/dailyBackup) so a bad write to /entries can never destroy it.
  // Runs at most once per calendar day (gated by a localStorage date flag).
  const maybeDailyBackup=useCallback((uid,fullEntries)=>{
    try{
      const t=today();
      // Always keep the local snapshot fresh.
      saveDailyBackupLocal(uid,fullEntries);
      // Backend snapshot once per day — store the FULL set (incl. tombstones) in
      // a separate node, so even total loss of /entries is recoverable from here.
      const flagKey=`jivanlog-lastRemoteBackup-${uid}`;
      if(localStorage.getItem(flagKey)===t)return;
      if(!fullEntries.length)return; // never overwrite a good backup with nothing
      fbDb.ref(`users/${uid}/dailyBackup`).set({date:t,savedAt:new Date().toISOString(),count:fullEntries.length,entries:fullEntries})
        .then(()=>{try{localStorage.setItem(flagKey,t);}catch(e){}})
        .catch(e=>console.warn("Backend daily backup deferred:",e));
    }catch(e){console.warn("maybeDailyBackup:",e);}
  },[]);

  // Restore today's entries from the daily backup (backend first, then local).
  // Additive .update() only — never deletes anything currently in /entries.
  const restoreFromBackup=useCallback(async()=>{
    if(!user||user._offline){alert("Restore needs an internet connection. Please reconnect and try again.");return;}
    const uid=user.uid;
    try{
      let snap=await fbDb.ref(`users/${uid}/dailyBackup`).get();
      let bk=snap.exists()?snap.val():null;
      const local=getDailyBackupLocal(uid);
      // Prefer whichever snapshot has more entries.
      if(local&&(!bk||(local.entries||[]).length>(bk.entries||[]).length))bk=local;
      const list=bk&&bk.entries?bk.entries:[];
      if(!list.length){alert("No backup entries found to restore.");return;}
      if(!confirm(`Restore ${list.length} entr${list.length===1?"y":"ies"} from the ${bk.date} backup?\n\nThis re-adds any missing entries. It does not delete anything you already have.`))return;
      const updates={};
      list.forEach(e=>{const k=String(e.id||genId()).replace(/[\s.#$\[\]/]/g,"_");updates[k]={...e,id:k};});
      await fbDb.ref(`users/${uid}/entries`).update(updates);
      alert("Restore complete. Your entries have been re-added.");
    }catch(e){console.warn("Restore failed:",e);alert("Restore failed: "+(e.message||e));}
  },[user]);

  // Download a lossless full backup (all entries incl. tombstones) as JSON.
  const exportFullBackup=useCallback(()=>{
    const all=[...entries,...deletedEntries];
    const blob=new Blob([buildFullJSON(all)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`jivanlog-full-backup-${today()}.json`;document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
  },[entries,deletedEntries]);

  // Restore from a full JSON backup — additive .update() preserving ALL fields
  // (including deleted/deletedAt). Never removes anything.
  const importFullBackup=useCallback(async(jsonText)=>{
    if(!user||user._offline){alert("Importing a backup needs an internet connection.");return;}
    try{
      const data=JSON.parse(jsonText);
      const list=Array.isArray(data)?data:(data.entries||[]);
      if(!list.length){alert("No entries found in that backup file.");return;}
      if(!confirm(`Import ${list.length} entries from this backup?\n\nThis re-adds/updates entries by ID. It never deletes anything you already have.`))return;
      const updates={};
      list.forEach(e=>{const k=String(e.id||genId()).replace(/[\s.#$\[\]/]/g,"_");updates[k]={...e,id:k,date:normDate(e.date)};});
      await fbDb.ref(`users/${user.uid}/entries`).update(updates);
      alert(`✓ Imported ${list.length} entries.`);
    }catch(e){console.warn("JSON import failed:",e);alert("Import failed: "+(e.message||e));}
  },[user]);

  // Flush pending offline queue to Firebase (called on reconnect or "Sync Now").
  // A queued entry is removed ONLY after its write is CONFIRMED by the server
  // (the .update() promise resolves only on server ack while online). Entries
  // added during the flush are preserved (we remove by exact id, not clear-all).
  const flushOfflineQueue=useCallback(async()=>{
    if(!user||user._offline)return;          // offline session can't write to Firebase
    if(!isOnlineRef.current)return;          // don't attempt while disconnected
    const uid=user.uid;
    const queued=getOfflineQ(uid);
    if(!queued.length)return;
    setSyncStatus("saving");
    try{
      const updates={};const ids=[];
      queued.forEach(e=>{const k=e.id.replace(/[\s.#$\[\]/]/g,"_");updates[k]={...e,id:k};ids.push(e.id);});
      // Race the write against a timeout so a mid-flush disconnect can't hang it.
      await Promise.race([
        fbDb.ref(`users/${uid}/entries`).update(updates),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("flush-timeout")),12000))
      ]);
      // Confirmed by server — remove exactly these ids; keep anything added since.
      const left=removeFromQueue(uid,ids);setQueueSize(left.length);
      setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),1500);
    }catch(e){console.warn("Flush deferred, queue intact:",e&&e.message||e);setSyncStatus("idle");}
  },[user]);

  // Flush when .info/connected becomes true
  useEffect(()=>{if(isOnline&&user)flushOfflineQueue();},[isOnline,user,flushOfflineQueue]);
  // Secondary flush trigger (navigator online fires before .info/connected sometimes)
  useEffect(()=>{const f=()=>{if(user)flushOfflineQueue();};window.addEventListener("online",f);return()=>window.removeEventListener("online",f);},[user,flushOfflineQueue]);

  // Persist helpers
  const persistEntries=useCallback(async arr=>{
    if(!user)return;
    const uid=user.uid;
    // Always write cache first — survives even if Firebase write fails
    saveTodayCache(uid,arr);
    setSyncStatus("saving");
    try{
      // Use .update() not .set() — writes only these entries, never wipes others.
      // .set() on the full collection caused silent data loss when the write
      // promise was killed mid-flight (e.g. by a Chrome extension intercepting
      // the service worker message channel).
      const updates=arr.reduce((acc,e)=>{const k=e.id.replace(/[\s.#$\[\]/]/g,"_");acc[k]={...e,id:k};return acc;},{});
      await fbDb.ref(`users/${uid}/entries`).update(updates);
      // Do NOT clearOfflineQ here — queue is managed by addEntry/flushOfflineQueue.
      // Clearing it here would destroy entries queued while this write was in-flight.
      setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),1500);
    }catch(e){console.warn("persistEntries failed:",e);setSyncStatus("idle");}
  },[user]);

  const persistKey=useCallback(async(key,val)=>{
    if(!user)return;
    try{await dbSet(user.uid,key,val);}catch(e){console.error("Persist:",key,e);}
  },[user]);

  const saveEntries  =useCallback(n=>persistEntries(n),[persistEntries]);
  // Write only the new/changed entries using .update() — more reliable for large imports
  const persistImport=useCallback(async(newEntries)=>{
    if(!user||!newEntries.length)return;
    try{
      const updates={};
      // Sanitize IDs — Firebase keys cannot contain . # $ [ ] /
      newEntries.forEach(e=>{
        const safeId=e.id.replace(/[.#$\[\]/]/g,"_");
        updates[safeId]={...e,id:safeId};
      });
      await fbDb.ref(`users/${user.uid}/entries`).update(updates);
      console.log("Import persisted:",newEntries.length,"entries via .update()");
    }catch(e){console.error("persistImport error:",e);throw e;}
  },[user]);
  const saveSettings =useCallback(n=>{setSettings(n);persistKey("settings",n);},[persistKey]);
  const saveDefaults =useCallback(n=>{setDefaults(n);persistKey("defaults",n);},[persistKey]);
  const saveTheme    =useCallback(m=>{setTheme(m);   persistKey("theme",m);},[persistKey]);
  const saveDayRollover=useCallback(min=>{setDayRolloverMinR(min);setDayRolloverCache(min);persistKey("dayRolloverMin",min);},[persistKey]);

  const addEntry=useCallback(entry=>{
    const[h,mm]=entryTime.split(":").map(Number);
    const d=new Date();d.setHours(h,mm,0,0);
    const newEntry={...entry,id:genId(),timestamp:d.toISOString(),date:today()};
    const next=[...entries,newEntry];
    setEntries(next);
    if(user){
      const uid=user.uid;
      // 1. Write durable local copies FIRST — survive regardless of network
      saveMirror(uid,next);
      saveTodayCache(uid,next);
      saveDailyBackupLocal(uid,next);
      // 2. Push to offline queue — the authoritative pending-write store
      const q=getOfflineQ(uid);q.push(newEntry);saveOfflineQ(uid,q);setQueueSize(q.length);
      // 3. If online, flush queue via .update() (safe, additive, not .set())
      //    flushOfflineQueue is a no-op if offline — queue persists for later
      if(isOnlineRef.current)flushOfflineQueue();
    }
  },[entries,flushOfflineQueue,entryTime,user]);

  const addEntryDirect=useCallback(entry=>{
    const next=[...entries,entry];
    setEntries(next);
    if(user){
      const uid=user.uid;
      saveMirror(uid,next);saveTodayCache(uid,next);saveDailyBackupLocal(uid,next);
      const q=getOfflineQ(uid);if(!q.find(e=>e.id===entry.id)){q.push(entry);saveOfflineQ(uid,q);setQueueSize(q.length);}
      if(isOnlineRef.current)flushOfflineQueue();
    }
  },[entries,flushOfflineQueue,user]);

  const updateEntry=useCallback((id,data)=>{
    const next=entries.map(e=>e.id===id?{...e,...data}:e);
    const changed=next.find(e=>e.id===id);
    setEntries(next);
    if(user){
      const uid=user.uid;
      saveMirror(uid,next);saveTodayCache(uid,next);saveDailyBackupLocal(uid,next);
      if(user._offline){
        // Offline session: queue the edited entry so it flushes on reconnect.
        const q=getOfflineQ(uid).filter(e=>e.id!==id);q.push(changed);saveOfflineQ(uid,q);setQueueSize(q.length);
      }else if(isOnlineRef.current){
        const k=id.replace(/[\s.#$\[\]/]/g,"_");
        fbDb.ref(`users/${uid}/entries/${k}`).update({...changed,id:k}).catch(e=>console.warn("updateEntry remote:",e));
      }else{
        const q=getOfflineQ(uid).filter(e=>e.id!==id);q.push(changed);saveOfflineQ(uid,q);setQueueSize(q.length);
      }
    }
  },[entries,user]);

  // SOFT DELETE — never hard-deletes. Writes a tombstone {deleted,deletedAt}.
  // The entry stays in /entries (append-only) and in the mirror; it's just
  // hidden from live views and moved to Trash, fully restorable.
  const deleteEntry=useCallback(id=>{
    const target=entries.find(e=>e.id===id);
    const next=entries.filter(e=>e.id!==id);
    setEntries(next);
    if(!user)return;
    const uid=user.uid;
    const tomb={...(target||{id}),deleted:true,deletedAt:new Date().toISOString()};
    setDeletedEntries(prev=>[...prev.filter(e=>e.id!==id),tomb]);
    // Mirror keeps EVERYTHING (live + tombstones) so nothing is ever lost locally.
    const mirror=getMirror(uid).filter(e=>e.id!==id);mirror.push(tomb);saveMirror(uid,mirror);
    saveTodayCache(uid,next);saveDailyBackupLocal(uid,next);
    const k=id.replace(/[\s.#$\[\]/]/g,"_");
    if(!user._offline){
      // Single-key .update() setting the tombstone — never .remove(), never collection-level.
      fbDb.ref(`users/${uid}/entries/${k}`).update({deleted:true,deletedAt:tomb.deletedAt}).catch(e=>console.warn("deleteEntry tombstone:",e));
    }else{
      // Offline: queue the tombstone write so it syncs on reconnect.
      const q=getOfflineQ(uid).filter(e=>e.id!==id);q.push(tomb);saveOfflineQ(uid,q);setQueueSize(q.length);
    }
  },[entries,user]);

  // Restore a tombstoned entry from Trash.
  const restoreEntry=useCallback(id=>{
    const target=deletedEntries.find(e=>e.id===id);
    if(!target||!user)return;
    const uid=user.uid;
    const revived={...target,deleted:false,restoredAt:new Date().toISOString()};
    delete revived.deletedAt;
    setDeletedEntries(prev=>prev.filter(e=>e.id!==id));
    setEntries(prev=>[...prev.filter(e=>e.id!==id),revived]);
    const mirror=getMirror(uid).filter(e=>e.id!==id);mirror.push(revived);saveMirror(uid,mirror);
    const k=id.replace(/[\s.#$\[\]/]/g,"_");
    if(!user._offline){
      fbDb.ref(`users/${uid}/entries/${k}`).update({deleted:false,deletedAt:null,restoredAt:revived.restoredAt}).catch(e=>console.warn("restoreEntry:",e));
    }else{
      const q=getOfflineQ(uid).filter(e=>e.id!==id);q.push(revived);saveOfflineQ(uid,q);setQueueSize(q.length);
    }
  },[deletedEntries,user]);

  // Move ALL live entries to Trash via per-entry tombstone .update() (batched
  // multi-path update — additive only, never a node remove). Fully reversible.
  const tombstoneAll=useCallback(()=>{
    if(!user)return;
    const uid=user.uid;
    const now=new Date().toISOString();
    const live=entries.slice();
    if(!live.length)return;
    const tombs=live.map(e=>({...e,deleted:true,deletedAt:now}));
    setEntries([]);
    setDeletedEntries(prev=>{const ex=new Set(tombs.map(t=>t.id));return[...prev.filter(e=>!ex.has(e.id)),...tombs];});
    // Mirror keeps everything (now all tombstoned + any previously-deleted).
    const prevDead=getMirror(uid).filter(e=>e.deleted&&!live.find(l=>l.id===e.id));
    saveMirror(uid,[...prevDead,...tombs]);
    saveTodayCache(uid,[]);saveDailyBackupLocal(uid,[]);
    if(!user._offline){
      const updates={};
      tombs.forEach(t=>{const k=t.id.replace(/[\s.#$\[\]/]/g,"_");updates[k]={deleted:true,deletedAt:now};});
      fbDb.ref(`users/${uid}/entries`).update(updates).catch(e=>console.warn("tombstoneAll:",e));
    }else{
      const q=getOfflineQ(uid);tombs.forEach(t=>q.push(t));saveOfflineQ(uid,q);setQueueSize(q.length);
    }
  },[entries,user]);

  const clearAll=useCallback(()=>{
    if(!confirm("Clear all entries?\n\nEntries are moved to Trash (not destroyed) and can be restored. A backup downloads first.\n\nPress OK to continue."))return;
    if(!confirm("FINAL CONFIRMATION\n\nPress OK to download backup, then move all entries to Trash."))return;
    downloadCSV(buildAllCSV([...entries,...deletedEntries]),`jivanlog-backup-${today()}.csv`);
    tombstoneAll();
  },[entries,deletedEntries,user,tombstoneAll]);

  const onClearAll=useCallback(async()=>{
    downloadCSV(buildAllCSV([...entries,...deletedEntries]),`jivanlog-backup-full-${today()}.csv`);
    // Entries → Trash (reversible). Config is reset (factory-restorable).
    tombstoneAll();
    if(user){try{
      await Promise.all([dbSet(user.uid,"settings",{foodCategories:[],liquidTypes:[],liquidNotes:{},liquidSubTypes:{},exerciseTypes:[],medicalPresets:[],medications:[]}),dbSet(user.uid,"defaults",{foodCategories:[],liquidTypes:[],liquidNotes:{},liquidSubTypes:{},exerciseTypes:[],medicalPresets:[],medications:[]}),dbSet(user.uid,"theme","system")]);
      const empty={foodCategories:[],liquidTypes:[],liquidNotes:{},liquidSubTypes:{},exerciseTypes:[],medicalPresets:[],medications:[]};
      setSettings({...empty});setDefaults({...empty});setTheme("system");setDayRolloverMinR(90);setDayRolloverCache(90);
    }catch(e){console.error(e);}}
  },[entries,deletedEntries,user,tombstoneAll]);

  const onClearEntries=useCallback(async()=>{
    // Move all live entries to Trash (reversible) — never a node remove.
    tombstoneAll();
  },[entries,user,tombstoneAll]);

  const onClearConfig=useCallback(async section=>{
    const emptyMap={
      food:{foodCategories:[]},
      drinks:{liquidTypes:[],liquidNotes:{},liquidSubTypes:{}},
      exercise:{exerciseTypes:[]},
      medical:{medicalPresets:[]},
      meds:{medications:[]},
    };
    const patch=emptyMap[section]||{};
    const newDef={...defaults,...patch};const newSet={...settings,...patch};
    setDefaults(newDef);setSettings(newSet);
    if(user){try{await Promise.all([dbSet(user.uid,"defaults",newDef),dbSet(user.uid,"settings",newSet)]);}catch(e){}}
  },[defaults,settings,user]);

  const onImportConfig=useCallback(async cfg=>{
    const newDef={...defaults,...cfg};const newSet={...settings,...cfg};
    setDefaults(newDef);setSettings(newSet);
    if(user){try{await Promise.all([dbSet(user.uid,"defaults",newDef),dbSet(user.uid,"settings",newSet)]);}catch(e){}}
    alert("✓ Config imported successfully.");
  },[defaults,settings,user]);

  const handleImport=useCallback(async csvText=>{
    try{
      const imported=parseAndMergeCSV(csvText,entries);
      if(!imported.length){alert("No new entries found — all IDs already exist.");return;}
      if(!confirm(`Import ${imported.length} new entries?\nDuplicates are skipped.\nPress OK to merge.`))return;
      // Merge imported into existing, new wins over old with same ID
      const existMap=Object.fromEntries(entries.map(e=>[e.id,e]));
      imported.forEach(e=>{existMap[e.id]=e;});
      const merged=Object.values(existMap);
      // Update React state immediately so UI reflects new data
      setEntries(merged);
      if(user){saveMirror(user.uid,merged);saveTodayCache(user.uid,merged);}
      // Write ONLY the new entries to Firebase using .update() (faster, more reliable)
      await persistImport(imported);
      alert(`✓ Imported ${imported.length} entries.\nTotal in database: ${merged.length}\nOpen 📋 Manage — use ◀▶ buttons to browse past dates.`);
    }catch(err){alert("Import failed: "+err.message+"\n\nPlease try again.");console.error("Import error:",err);}
  },[entries,user,persistImport]);

  const signOut=async()=>{
    if(!confirm("Sign out of JivanLog?\nYour data is saved to Firebase."))return;
    clearCachedAuthUser();
    setOfflineAuth(false);
    await fbAuth.signOut();setEntries([]);setDataLoaded(false);setLocked(false);
  };

  if(authState==="checking")return<LoadingScreen message="Checking sign-in…"/>;
  if(authState==="out")return<LoginScreen error={authError}/>;

  // Derive sync display state
  const displaySync=!isOnline?"offline":queueSize>0?"pending":syncStatus;
  const syncIcon=displaySync==="offline"?"📵":displaySync==="pending"?"⏳":displaySync==="saving"?"💾":displaySync==="synced"?"✓":"☁";
  const syncColor=displaySync==="offline"?T.danger:displaySync==="pending"?T.waterBtnText:displaySync==="saving"?T.textMuted:displaySync==="synced"?"#4ade80":T.border;

  const dayStr=new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});

  return(
    <div style={{maxWidth:480,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:T.bg,color:T.text,fontFamily:"'DM Sans',system-ui,sans-serif",overflow:"hidden",position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px}
        input,select,textarea{background:${T.inputBg};color:${T.text};border:1px solid ${T.border};border-radius:8px;padding:7px 9px;font-family:inherit;font-size:0.83rem;outline:none;width:100%}
        input:focus,select:focus{border-color:${T.accent}}
        select option{background:${T.inputBg}}
        button{cursor:pointer;font-family:inherit}
        .card{background:${T.cardBg};border:1px solid ${T.border};border-radius:12px;padding:11px;margin-bottom:8px}
        .slabel{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.09em;color:${T.textMuted};margin-bottom:5px;font-weight:600}
        .tle{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid ${T.border}22}
        .tle:last-child{border-bottom:none}
        .tbtn{padding:5px 10px;font-size:0.79rem;border-radius:8px;background:${T.cardBg};color:${T.textMuted};border:1px solid ${T.border};white-space:nowrap;cursor:pointer;font-family:inherit;font-weight:500}
        .tbtn.on{background:${T.accentBg};color:${T.accent};border-color:${T.accentBtn};font-weight:600}
        .wbtn{background:${T.waterBtn};color:${T.waterBtnText};border:1px solid ${T.border};padding:7px 12px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer}
        .wbtn:hover{background:${T.accentBtn};color:#fff}
        .ibtn{background:none;border:none;padding:3px 5px;border-radius:6px;color:${T.textMuted};font-size:0.82rem;cursor:pointer}
        .ibtn:hover{background:${T.border};color:${T.text}}
        .ctbl{width:100%;border-collapse:collapse;font-size:0.73rem}
        .ctbl th{background:${T.navBg};color:${T.textMuted};padding:5px 6px;text-align:left;border:1px solid ${T.border};font-weight:600;white-space:nowrap}
        .ctbl td{padding:5px 6px;border:1px solid ${T.border};vertical-align:top;word-break:break-word}
        .ctbl tr:nth-child(even) td{background:${T.even}}
        input[type=number]::-webkit-inner-spin-button{opacity:0.4}
        input[type=time]{color-scheme:${theme==="light"?"light":"dark"}}
        input[type=date]{color-scheme:${theme==="light"?"light":"dark"};background:${T.inputBg}!important;color:${T.text}!important;}
        .tpl-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid ${T.border}22;font-size:0.82rem}
        .tpl-row:last-child{border-bottom:none}
        .tpl-chk{width:18px;height:18px;accent-color:${T.accentBtn};flex-shrink:0;cursor:pointer}
      `}</style>

      {locked&&<LockScreen T={T} onUnlock={()=>setLocked(false)}/>}

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px 7px",background:T.navBg,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <img src={LOGO_SVG} style={{width:32,height:32,borderRadius:8}} alt="logo"/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:"0.95rem",color:T.accent,lineHeight:1.1}}>JivanLog</div>

        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span title={displaySync==="offline"?"Offline — entries saved locally":displaySync==="pending"?`${queueSize} pending — tap to sync`:displaySync==="saving"?"Syncing…":displaySync==="synced"?"Synced ✓":"Synced"} style={{fontSize:"1rem",color:syncColor,transition:"color 0.3s",cursor:queueSize>0?"pointer":"default"}} onClick={queueSize>0?flushOfflineQueue:undefined}>{syncIcon}</span>
          {queueSize>0&&<button onClick={flushOfflineQueue} title="Sync pending entries now" style={{fontSize:"0.62rem",padding:"2px 5px",borderRadius:5,border:`1px solid ${T.border}`,background:T.cardBg,color:T.waterBtnText,cursor:"pointer",fontFamily:"inherit",fontWeight:600,flexShrink:0}}>Sync {queueSize}</button>}

        ))}
        {/* User avatar button — tap for lock/sign-out menu */}
        <div style={{position:"relative",flex:1,display:"flex",justifyContent:"center"}}>
          <button title={user.displayName||user.email} onClick={()=>setShowUserMenu(v=>!v)}
            style={{background:"none",border:"none",cursor:"pointer",padding:"5px 0 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            {user.photoURL
              ?<img src={user.photoURL} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${showUserMenu?T.accentBtn:T.border}`}} alt="avatar"/>
              :<div style={{width:28,height:28,borderRadius:"50%",background:T.accentBtn,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",fontWeight:700}}>{(user.displayName||user.email||"U")[0].toUpperCase()}</div>}
            <div style={{fontSize:"0.5rem",color:T.textMuted,fontFamily:"inherit"}}>Account</div>
          </button>
          {showUserMenu&&<div style={{position:"absolute",bottom:"100%",right:0,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:12,padding:8,minWidth:180,boxShadow:"0 -4px 16px #0004",zIndex:200}}>
            <div style={{padding:"6px 10px 8px",borderBottom:`1px solid ${T.border}`,marginBottom:6}}>
              <div style={{fontWeight:600,fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||"User"}</div>

            </div>
            <button onClick={()=>{setShowUserMenu(false);if(confirm("Lock JivanLog?\nYour data is saved."))setLocked(true);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"none",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:"0.82rem",color:T.text}}>🔒 Lock session</button>
            <button onClick={()=>{setShowUserMenu(false);signOut();}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"none",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:"0.82rem",color:T.danger}}>↩ Sign out</button>
          </div>}
        </div>
      </nav>
    </div>
  );
}

// ── Shared time-input blur normaliser ────────────────────────────────────────
const normTime=setter=>e=>{
  const raw=e.target.value.replace(/[^0-9]/g,"");
  if(!raw)return;
  let h,mi;
  if(raw.length<=2){h=+raw;mi=0;}
  else if(raw.length===3){h=+raw[0];mi=+raw.slice(1);}
  else{h=+raw.slice(0,2);mi=+raw.slice(2,4);}
  h=Math.min(23,Math.max(0,h));mi=Math.min(59,Math.max(0,mi));
  setter(String(h).padStart(2,"0")+":"+String(mi).padStart(2,"0"));
};
// ── Shared time input element ─────────────────────────────────────────────────
const TimeInput=({value,onChange,T})=>(
  <input type="text" title="Entry time" placeholder="9.20" value={value}
    onChange={e=>onChange(e.target.value)} onBlur={normTime(onChange)}
    maxLength={5} style={{width:58,fontSize:"0.8rem",padding:"6px 4px",
    fontFamily:"'DM Mono',monospace",textAlign:"center",flexShrink:0}}/>
);

function MealEntry({settings,onAdd,entryTime,setEntryTime,T}){
  const[mt,setMt]=useState(autoMeal);const[food,setFood]=useState("");const[foodSub,setFoodSub]=useState("");const[qty,setQty]=useState("");const[unit,setUnit]=useState("g");const[notes,setNotes]=useState("");const[fl,setFl]=useState(false);
  const foods=foodItems(settings.foodCategories||FD.foodCategories);

  useEffect(()=>{if(food){const fi=foods.find(f=>f.name===food);setNotes(fi?.note||"");}},[settings]);
  const save=()=>{if(!food||!qty)return;onAdd({type:"meal",mealType:mt,food,foodSubType:foodSub,qty,unit,notes});setFood("");setFoodSub("");setQty("");setNotes("");setFl(true);setTimeout(()=>setFl(false),1200);};
  return(<div className="card"><div className="slabel">🍽️ Meal</div><div style={{display:"flex",gap:5,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}><select value={mt} onChange={e=>setMt(e.target.value)} style={{flex:"0 0 95px"}}>{MEAL_TYPES.map(m=><option key={m}>{m}</option>)}</select><select value={food} onChange={e=>onFoodChange(e.target.value)} style={{flex:"2 1 80px",minWidth:0}}><option value="">Food item…</option>{[...foods].sort((a,b)=>a.name.localeCompare(b.name)).map(f=><option key={f.name} value={f.name}>{pickIcon(f.name,"food",f.icon||"")} {f.name}</option>)}</select>{hasFoodSub&&<select value={foodSub} onChange={e=>setFoodSub(e.target.value)} style={{flex:"1 1 90px",minWidth:0}}><option value="">Sub-type…</option>{foodObj.subTypes.map(s=><option key={s}>{s}</option>)}</select>}<input type="number" placeholder="Qty" value={qty} onChange={e=>setQty(e.target.value)} style={{flex:"0 0 54px",width:54}}/><select value={unit} onChange={e=>setUnit(e.target.value)} style={{flex:"0 0 60px",width:60}}>{FOOD_UNITS.map(u=><option key={u}>{u}</option>)}</select></div><div style={{display:"flex",gap:6,alignItems:"center"}}><TimeInput value={entryTime} onChange={setEntryTime}/><input placeholder="Notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)} style={{flex:1}}/><Saver flash={fl} onClick={save} T={T}/></div></div>);
}
function LiquidEntry({settings,onAdd,entryTime,setEntryTime,T}){
  const allTypes=(settings.liquidTypes||FD.liquidTypes||[]);
  const liqNotes=settings.liquidNotes||FD.liquidNotes||{};
  const liqSubTypes=settings.liquidSubTypes||FD.liquidSubTypes||{};

// ── Auto-derive medication timing from current time ─────────────────────────
function autoMedTiming(timeStr){
  const[h,m]=timeStr.split(":").map(Number);
  const mins=h*60+(m||0);
  if(mins<10*60)return"Before breakfast";
  if(mins<11*60)return"After breakfast";
  if(mins<13*60)return"Before lunch";
  if(mins<14*60)return"After lunch";
  if(mins<20*60)return"Before dinner";
  if(mins<22*60)return"After dinner";
  return"Bedtime";
}

function parseMedVal(v){
  if(!v)return null;
  // BP: "120/80" → take systolic only for primary line; expose both
  if(typeof v==="string"&&v.includes("/")){
    const [s,d]=v.split("/").map(Number);
    return isNaN(s)?null:{sys:s,dia:isNaN(d)?null:d};
  }
  const n=parseFloat(v);
  return isNaN(n)?null:n;
}

function isoWeek(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const day=d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const y=d.getFullYear();
  const start=new Date(y,0,1);
  const w=Math.ceil((((d-start)/86400000)+1)/7);
  return `${y}-W${String(w).padStart(2,"0")}`;
}
function isoMonth(dateStr){return dateStr.slice(0,7);}
function isoYear(dateStr){return dateStr.slice(0,4);}

// Build {label, values:[]} series for a given metric, range and aggregation
function buildTrendSeries(entries, metricName, rangeKey, aggMode){
  // Filter medical entries for this metric
  const stripEmoji=s=>(s||"").replace(/^[^\w\d]+/,"").trim();
  const med=entries.filter(e=>e.type==="medical"&&(stripEmoji(e.readingType)||stripEmoji(e.detail1))===metricName);
  if(!med.length)return null;

  const now=new Date();
  // Date boundaries
  const cutoffs={
    "7d":  7,  "30d": 30, "90d": 90,
    "12w": 84, "25w":175, "12m":365, "all":9999
  };
  const days=cutoffs[rangeKey]||90;
  const cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-days);
  const inRange=rangeKey==="all"?med:med.filter(e=>new Date(e.date+"T00:00:00")>=cutoff);

  // Group key function
  const isWeekly=rangeKey==="12w"||rangeKey==="25w";
  const isMonthly=rangeKey==="12m";
  const groupFn=isMonthly?isoMonth:isWeekly?isoWeek:d=>d;

  // Bucket entries
  const buckets={};
  inRange.forEach(e=>{
    const key=groupFn(e.date);
    if(!buckets[key])buckets[key]=[];
    const raw=e.value??e.detail2??e.detail1;
    const v=parseMedVal(raw);
    if(v!==null)buckets[key].push({v,ts:e.timestamp||e.date,date:e.date});
  });

  const sortedKeys=Object.keys(buckets).sort();

  // Aggregate per bucket
  function aggBucket(items){
    if(!items.length)return null;
    // Sort helpers — sort items[] by date+time ascending/descending
    const asc=(a,b)=>a.ts.localeCompare(b.ts);
    const desc=(a,b)=>b.ts.localeCompare(a.ts);
    const isBP=typeof items[0].v==="object";
    if(isBP){
      // Sort items chronologically, then pick first or last by position
      const sortedAsc=[...items].filter(i=>i.v&&i.v.sys!==null).sort(asc);
      const sortedDesc=[...items].filter(i=>i.v&&i.v.sys!==null).sort(desc);
      if(!sortedAsc.length)return null;
      if(aggMode==="first")return{sys:sortedAsc[0].v.sys,dia:sortedAsc[0].v.dia,isBP:true};
      if(aggMode==="last") return{sys:sortedDesc[0].v.sys,dia:sortedDesc[0].v.dia,isBP:true};
      // avg
      const sysMean=Math.round(sortedAsc.reduce((s,i)=>s+i.v.sys,0)/sortedAsc.length);
      const validDia=sortedAsc.filter(i=>i.v.dia!==null);
      const diaMean=validDia.length?Math.round(validDia.reduce((s,i)=>s+i.v.dia,0)/validDia.length):null;
      return{sys:sysMean,dia:diaMean,isBP:true};
    }
    const valid=items.filter(i=>typeof i.v==="number");
    if(!valid.length)return null;
    if(aggMode==="first")return valid.slice().sort(asc)[0].v;
    if(aggMode==="last") return valid.slice().sort(desc)[0].v;
    return Math.round((valid.reduce((s,i)=>s+i.v,0)/valid.length)*10)/10;
  }

  const labels=[];const primary=[];const secondary=[];
  sortedKeys.forEach(k=>{
    const agg=aggBucket(buckets[k]);
    if(agg===null)return;
    // Format label
    if(isMonthly)labels.push(k.slice(0,7)); // YYYY-MM
    else if(isWeekly)labels.push(k);         // YYYY-Www
    else labels.push(k.slice(5));             // MM-DD
    if(agg&&agg.isBP){
      primary.push(agg.sys);secondary.push(agg.dia);
    } else {
      primary.push(agg);
    }
  });
  return{labels,primary,secondary,isBP:primary.length&&buckets[sortedKeys[0]]&&typeof aggBucket(buckets[sortedKeys[0]])==="object"&&aggBucket(buckets[sortedKeys[0]])&&aggBucket(buckets[sortedKeys[0]]).isBP};
}

const TREND_RANGES=[
  {key:"7d",  label:"7 Days"},
  {key:"30d", label:"30 Days"},
  {key:"90d", label:"90 Days"},
  {key:"12w", label:"12 Weeks"},
  {key:"25w", label:"25 Weeks"},
  {key:"12m", label:"12 Months"},
  {key:"all", label:"All Time"},
];
const AGG_MODES=[
  {key:"avg",   label:"Avg"},
  {key:"first", label:"First"},
  {key:"last",  label:"Last"},
];
const TREND_METRICS=["Sugar","BP","Weight"];

function TrendsPanel({entries,settings,T}){
  const[metric,setMetric]=React.useState("Sugar");
  const[range,setRange]=React.useState("all");
  const[agg,setAgg]=React.useState("avg");
  const canvasRef=React.useRef(null);
  const chartRef=React.useRef(null);

  // Resolve available metrics from settings
  const medPresets=settings.medicalPresets||FD.medicalPresets;
  const _stripE=s=>(s||"").replace(/^[^\w\d]+/,"").trim();
  const availMetrics=medPresets.map(p=>typeof p==="string"?p:p.name).filter(n=>
    entries.some(e=>e.type==="medical"&&(_stripE(e.readingType)||_stripE(e.detail1))===n)
  );

  React.useEffect(()=>{
    const series=buildTrendSeries(entries,metric,range,agg);
    const canvas=canvasRef.current;
    if(!canvas)return;

    // Destroy previous chart
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}

    if(!series||!series.labels.length){
      const ctx=canvas.getContext("2d");
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=T.textMuted;ctx.font="14px Arial";ctx.textAlign="center";
      ctx.fillText("No data for this metric and range.",canvas.width/2,canvas.height/2);
      return;
    }

    const isDark=document.documentElement.getAttribute("data-theme")==="dark"||
      (document.documentElement.getAttribute("data-theme")==="system"&&window.matchMedia("(prefers-color-scheme:dark)").matches);

    const gridColor=isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)";
    const textColor=isDark?"#aaa":"#555";

    const datasets=[];
    const rangeLabel=TREND_RANGES.find(r=>r.key===range)?.label||range;
    const aggLabel=AGG_MODES.find(a=>a.key===agg)?.label||agg;

    if(series.isBP){
      datasets.push({
        label:`${metric} Systolic (${aggLabel})`,
        data:series.primary,
        borderColor:"#e53935",backgroundColor:"rgba(229,57,53,0.12)",
        tension:0.35,pointRadius:3,pointHoverRadius:6,fill:false,
      });
      if(series.secondary&&series.secondary.length){
        datasets.push({
          label:`${metric} Diastolic (${aggLabel})`,
          data:series.secondary,
          borderColor:"#fb8c00",backgroundColor:"rgba(251,140,0,0.12)",
          tension:0.35,pointRadius:3,pointHoverRadius:6,fill:false,
        });

      const [bc,bgc]=colors[metric]||["#1a73e8","rgba(26,115,232,0.1)"];
      datasets.push({
        label:`${metric} (${aggLabel}, ${rangeLabel})`,
        data:series.primary,
        borderColor:bc,backgroundColor:bgc,
        tension:0.35,pointRadius:3,pointHoverRadius:6,fill:true,
      });
    }

    // Unit for Y axis
    const unit=(()=>{
      const p=medPresets.find(p=>(typeof p==="string"?p:p.name)===metric);
      return p&&typeof p==="object"?p.unit||"":"";
    })();

    const ctx=canvas.getContext("2d");
    chartRef.current=new Chart(ctx,{
      type:"line",
      data:{labels:series.labels,datasets},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:true,labels:{color:textColor,font:{size:11}}},
          tooltip:{
            callbacks:{
              label:ctx=>{
                const v=ctx.parsed.y;
                if(v===null||v===undefined)return null;
                return` ${ctx.dataset.label.split("(")[0].trim()}: ${v}${unit?" "+unit:""}`;
              }
            }
          }
        },
        scales:{
          x:{ticks:{color:textColor,maxRotation:45,font:{size:10}},grid:{color:gridColor}},
          y:{ticks:{color:textColor,font:{size:10},callback:(v)=>unit?`${v} ${unit}`:v},grid:{color:gridColor}},
        }
      }
    });

    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[metric,range,agg,entries,T]);

  // Count data points for selected metric
  const dataCount=entries.filter(e=>e.type==="medical"&&(e.readingType||e.detail1)===metric).length;

  return(<div>
    <div className="card" style={{marginBottom:8}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {(availMetrics.length?availMetrics:TREND_METRICS).map(m=>(

            style={{fontSize:"0.78rem"}}>{m}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {TREND_RANGES.map(r=>(
          <button key={r.key} onClick={()=>setRange(r.key)}
            className={`tbtn${range===r.key?" on":""}`}
            style={{fontSize:"0.75rem",padding:"4px 8px"}}>{r.label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:5,marginBottom:4,alignItems:"center"}}>
        <span style={{fontSize:"0.72rem",color:T.textMuted}}>Reading:</span>
        {AGG_MODES.map(a=>(
          <button key={a.key} onClick={()=>setAgg(a.key)}
            className={`tbtn${agg===a.key?" on":""}`}
            style={{fontSize:"0.75rem",padding:"4px 10px"}}>{a.label}</button>
        ))}
        <span style={{fontSize:"0.7rem",color:T.textMuted,marginLeft:"auto"}}>{dataCount} readings</span>
      </div>
    </div>
    <div className="card" style={{padding:"8px 4px"}}>
      <div style={{position:"relative",height:280}}>
        <canvas ref={canvasRef} style={{width:"100%",height:"100%"}}/>
      </div>
      <div style={{fontSize:"0.68rem",color:T.textMuted,textAlign:"center",marginTop:6}}>
        {agg==="avg"?"Average of all readings in period"
          :agg==="first"?"First (earliest) reading in period"
          :"Last (most recent) reading in period"}
        {(range==="12w"||range==="25w")?" · Weekly buckets"
          :range==="12m"?" · Monthly buckets"
          :" · Daily values"}
      </div>
    </div>
  </div>);
}

// ── Config CSV export/import helpers ─────────────────────────────────────────
// Each section exports as its own CSV with a sentinel header row
// Sentinel: #JivanLog-Config-<section>-<version>

function csvCell(v){
  const s=String(v==null?"":v);
  return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`  :s;
}
function csvRow(arr){return arr.map(csvCell).join(",");}

function exportConfigCSV(settings,section){
  const lines=[];
  if(section==="all"||section==="food"){
    lines.push(`#JivanLog-Config-food-${APP_VERSION}`);
    lines.push(csvRow(["Name","Note","SubTypes"]));
    foodItems(settings.foodCategories||FD.foodCategories).forEach(f=>{
      lines.push(csvRow([f.name,f.note||"",(f.subTypes||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="drinks"){
    lines.push(`#JivanLog-Config-drinks-${APP_VERSION}`);
    lines.push(csvRow(["Name","Note","SubTypes"]));
    const types=(settings.liquidTypes||FD.liquidTypes).filter(t=>t!=="--------");
    const notes=settings.liquidNotes||FD.liquidNotes||{};
    const subs=settings.liquidSubTypes||FD.liquidSubTypes||{};
    types.forEach(t=>{
      lines.push(csvRow([t,notes[t]||"",(subs[t]||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="exercise"){
    lines.push(`#JivanLog-Config-exercise-${APP_VERSION}`);
    lines.push(csvRow(["Name","Metrics","Note","SubTypes"]));
    (settings.exerciseTypes||FD.exerciseTypes).forEach(e=>{
      lines.push(csvRow([e.name,(e.metrics||[]).join(";"),e.note||"",(e.subTypes||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="medical"){
    lines.push(`#JivanLog-Config-medical-${APP_VERSION}`);
    lines.push(csvRow(["Name","Unit"]));
    (settings.medicalPresets||FD.medicalPresets).forEach(p=>{
      lines.push(csvRow([typeof p==="string"?p:p.name,typeof p==="string"?"":p.unit||""]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="meds"){
    lines.push(`#JivanLog-Config-meds-${APP_VERSION}`);
    lines.push(csvRow(["Name"]));
    (settings.medications||FD.medications).forEach(m=>lines.push(csvCell(m)));
  }
  return lines.join("\n");
}

function importConfigCSV(csvText){
  // Splits multi-section "all" exports or handles single-section files
  const lines=csvText.split("\n").map(l=>l.trim());
  const result={};
  let section=null,headers=[];
  const parseCells=line=>{
    const row=[];let cur="",inQ=false;
    for(const ch of line+","){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){row.push(cur.replace(/""/g,'"'));cur="";}
      else cur+=ch;
    }
    return row;
  };
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(!line)continue;
    // Sentinel row
    const sm=line.match(/^#JivanLog-Config-(\w+)-/);
    if(sm){section=sm[1];headers=[];continue;}
    if(!section)continue;
    // Header row (first non-sentinel, non-empty row after sentinel)
    if(!headers.length){headers=parseCells(line).map(h=>h.toLowerCase());continue;}
    const cells=parseCells(line);
    const get=h=>cells[headers.indexOf(h)]||"";
    const spl=v=>v?v.split(";").map(s=>s.trim()).filter(Boolean):[];

    if(section==="food"){
      if(!result.foodCategories)result.foodCategories=[];
      result.foodCategories.push({name:get("name"),note:get("note"),subTypes:spl(get("subtypes"))});
    }
    if(section==="drinks"){
      if(!result.liquidTypes)result.liquidTypes=[];
      if(!result.liquidNotes)result.liquidNotes={};
      if(!result.liquidSubTypes)result.liquidSubTypes={};
      const name=get("name");if(!name)continue;
      result.liquidTypes.push(name);
      if(get("note"))result.liquidNotes[name]=get("note");
      const subs=spl(get("subtypes"));if(subs.length)result.liquidSubTypes[name]=subs;
    }
    if(section==="exercise"){
      if(!result.exerciseTypes)result.exerciseTypes=[];
      result.exerciseTypes.push({name:get("name"),metrics:spl(get("metrics")),note:get("note"),subTypes:spl(get("subtypes"))});
    }
    if(section==="medical"){
      if(!result.medicalPresets)result.medicalPresets=[];
      result.medicalPresets.push({name:get("name"),unit:get("unit")});
    }
    if(section==="meds"){
      if(!result.medications)result.medications=[];
      const name=cells[0]||"";if(name&&!name.startsWith("#"))result.medications.push(name);
    }
  }
  if(!Object.keys(result).length)throw new Error("No config data found — check file format");
  return result;
}

      <button onClick={()=>setShowTrash(s=>!s)} style={{...btn,border:`1px solid ${T.border}`,background:T.inputBg,color:T.text}}>🗑️ Trash {dead.length?`(${dead.length})`:""} {showTrash?"▲":"▼"}</button>
      {showTrash&&(dead.length?

              <div style={{minWidth:0}}>
                <div style={{fontSize:"0.78rem",color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label(e)}</div>
                <div style={{fontSize:"0.66rem",color:T.textMuted}}>{normDate(e.date)} · deleted {e.deletedAt?new Date(e.deletedAt).toLocaleString():""}</div>
              </div>

            </div>
          ))}

      )}

    </>}

function BackupPanel({entries,deletedEntries,settings,defaults,onImport,onImportConfig,onClearEntries,onClearConfig,onClearAll,onRestoreEntry,onExportJSON,onImportJSON,onRestore,offlineAuth,T}){
  const dataRef=useRef();
  const cfgRef=useRef();
  const jsonRef=useRef();
  const[section,setSection]=useState("data");  // data | config | restore
  const[cfgSub,setCfgSub]=useState("all");
  const[entrySub,setEntrySub]=useState("all");
  const[showClear,setShowClear]=useState(false);

  // ── Local daily backup status ────────────────────────────────────────────
  const[localBk,setLocalBk]=useState(null);
  useEffect(()=>{
    try{
      const uid=entries.length>0?(entries[0]&&window._jivanUid)||"":"";
      // Read from all possible localStorage keys for this user
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith("jivanlog-dailyBackup-")){
          const v=JSON.parse(localStorage.getItem(k)||"null");
          if(v)setLocalBk(v);
          break;
        }
      }
    }catch(e){}
  },[]);

  const ENTRY_SUBS=[["all","All"],["meal","🍽️ Meals"],["liquid","💧 Drinks"],["exercise","🏃 Exercise"],["medical","🩺 Medical"],["medication","💊 Meds"]];
  const CFG_SUBS=[["all","All"],["food","🍽️ Food"],["drinks","💧 Drinks"],["exercise","🏃 Exercise"],["medical","🩺 Medical"],["meds","💊 Meds"]];
  const CLEAR_OPTS=[
    {key:"all",   label:"⚠️ Clear EVERYTHING",  desc:"All entries moved to Trash + all config reset to factory.",danger:true},
    {key:"entries",label:"🗑️ Clear all entries", desc:"All entries moved to Trash. Config is kept."},
    {key:"food",   label:"🍽️ Clear Food config",    desc:"Food list emptied. Entries unaffected."},
    {key:"drinks", label:"💧 Clear Drinks config",  desc:"Drinks list emptied. Entries unaffected."},
    {key:"exercise",label:"🏃 Clear Exercise config",desc:"Exercise types emptied. Entries unaffected."},
    {key:"medical",label:"🩺 Clear Medical config",  desc:"Medical presets emptied. Entries unaffected."},
    {key:"meds",   label:"💊 Clear Meds config",     desc:"Medications list emptied. Entries unaffected."},
  ];

  const doExportCSV=()=>{
    const all=[...entries,...(deletedEntries||[])];
    const filtered=entrySub==="all"?all:all.filter(e=>e.type===entrySub);
    downloadCSV(buildAllCSV(filtered),`jivanlog-data-${entrySub}-${today()}.csv`);
  };
  const doExportCfgCSV=()=>downloadCSV(exportConfigCSV(settings,cfgSub),`jivanlog-config-${cfgSub}-${today()}.csv`);

  const handleDataFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onImport(ev.target.result);
    r.readAsText(f);e.target.value="";
  };
  const handleCfgFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const cfg=importConfigCSV(ev.target.result);onImportConfig(cfg);}catch(err){alert("Config import failed: "+err.message);}};
    r.readAsText(f);e.target.value="";
  };
  const handleJSONFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onImportJSON(ev.target.result);
    r.readAsText(f);e.target.value="";
  };
  const doClear=key=>{
    const opt=CLEAR_OPTS.find(o=>o.key===key);
    if(!confirm(opt.label+"\n\n"+opt.desc+"\n\nPress OK to confirm."))return;
    if(key==="all"){if(!confirm("FINAL CONFIRMATION — press OK to clear everything."))return;onClearAll();}
    else if(key==="entries"){if(!confirm("FINAL CONFIRMATION — move all entries to Trash?"))return;onClearEntries();}
    else onClearConfig(key);
    setShowClear(false);
  };

    <div style={{marginBottom:8}}>

  return(<div>

          <span>✅ Live entries</span><span style={{fontWeight:600}}>{liveCount}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.78rem",color:T.textMuted,lineHeight:2}}>
          <span>🗑️ In Trash</span><span>{deadCount}</span>
        </div>
        {localBk&&<>
          <div style={{borderTop:`1px solid ${T.border}`,marginTop:6,paddingTop:6}}>
            <div style={{fontSize:"0.7rem",color:T.textMuted}}>📱 Last device backup</div>
            <div style={{fontSize:"0.72rem",color:T.text,marginTop:2}}>
              {localBk.date} · {(localBk.entries||[]).length} today's entries · saved {localBk.savedAt?new Date(localBk.savedAt).toLocaleTimeString():""}

      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>

        <div className="card">
          <div style={{fontSize:"0.73rem",color:T.textMuted,marginBottom:8,lineHeight:1.5}}>

          </div>
          <button onClick={doExportCSV} style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",fontFamily:"inherit",fontWeight:600,fontSize:"0.82rem",cursor:"pointer",marginBottom:6}}>
            ⬇️ Download CSV ({liveCount+deadCount} entries)
          </button>
          <button onClick={onExportJSON} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.accentBtn}`,background:"transparent",color:T.accent,fontFamily:"inherit",fontWeight:600,fontSize:"0.82rem",cursor:"pointer"}}>
            ⬇️ Download full backup JSON
          </button>
        </div>
      </Row>

      <Row label="⬆️ Import data">
        <div className="card">
          <div style={{fontSize:"0.73rem",color:T.textMuted,marginBottom:8,lineHeight:1.5}}>Import a CSV or JSON backup. Existing entries are never overwritten — only new IDs are added.</div>
          <button onClick={()=>dataRef.current&&dataRef.current.click()} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:T.inputBg,color:T.text,fontFamily:"inherit",fontWeight:600,fontSize:"0.82rem",cursor:"pointer",marginBottom:6}}>
            ⬆️ Import CSV

          <button onClick={()=>jsonRef.current&&jsonRef.current.click()} disabled={offlineAuth} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:offlineAuth?T.cardBg:T.inputBg,color:offlineAuth?T.textMuted:T.text,fontFamily:"inherit",fontWeight:600,fontSize:"0.82rem",cursor:offlineAuth?"not-allowed":"pointer"}}>

          <input ref={jsonRef} type="file" accept="application/json,.json" onChange={handleJSONFile} style={{display:"none"}}/>
        </div>
      </Row>

      <Row label="⚠️ Clear entries">
        <div className="card">
          {!showClear
            ?<button onClick={()=>setShowClear(true)} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,fontFamily:"inherit",fontWeight:600,fontSize:"0.82rem",cursor:"pointer"}}>Show clear options…</button>

            </div>
          }
        </div>
      </Row>
    </>}

function pickIcon(name, category="food", stored=""){
  if(stored)return stored;
  if(!name)return ICON_DEFAULTS[category]||"•";
  const lc=name.toLowerCase();
  for(const[kw,icon] of ICON_MAP){
    if(lc.includes(kw))return icon;
  }
  return ICON_DEFAULTS[category]||"•";
}
