      <span style={{fontSize:"0.72rem",color:T.textMuted}}>Sort:</span>
      <button onClick={()=>onUpdate([...fi].sort((a,b)=>a.name.localeCompare(b.name)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>A→Z</button>
      <button onClick={()=>onUpdate([...fi].sort((a,b)=>b.name.localeCompare(a.name)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>Z→A</button>
    </div>
    {fi.map((item,i)=>(
      <div key={item.name} className="card" style={{marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <ReorderBtns i={i} total={fi.length} onMove={move} T={T}/>
          <IconBtn name={item.name} category="food" stored={item.icon||""} onSet={ic=>upd(item.name,{icon:ic})} T={T}/>
          <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{item.name}</span>
          <button className="ibtn" onClick={()=>setEi(ei===item.name?null:item.name)}>{ei===item.name?"✖️":"✏️"}</button>
          <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(item.name)}>🗑️</button>
        </div>
        <input placeholder="Default note (optional)" value={item.note||""} onChange={e=>upd(item.name,{note:e.target.value})} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:ei===item.name?6:0,color:T.textSub}}/>
        {ei===item.name&&<div style={{marginTop:5}}>
          <div className="slabel">Sub-types</div>
          {(item.subTypes||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
            <ReorderBtns i={si} total={(item.subTypes||[]).length} onMove={(idx,dir)=>moveSub(item.name,idx,dir)} T={T}/>
            <span style={{flex:1}}>{s}</span>
            <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(item.name,s)}>🗑️</button>
          </div>))}
          <AddInline placeholder="Add sub-type..." onAdd={s=>addSub(item.name,s)} T={T}/>
        </div>}
      </div>
    ))}
  </div>);
}

function DrinkSetting({types,notes,subTypes,icons,onRemove,onUpdate,onIconUpdate,newItem,setNew,onAdd,T}){
  const[ei,setEi]=useState(null);
  const drinks=(types||[]).filter(t=>t!=="--------");
  const updNote=(name,note)=>onUpdate("notes",{...notes,[name]:note});
  const updSubs=(name,subs)=>onUpdate("subTypes",{...subTypes,[name]:subs});
  const move=(i,dir)=>{const moved=moveItem(drinks,i,dir);onUpdate("types",[...moved]);};
  const addSub=(name,s)=>{if(!s.trim())return;updSubs(name,[...((subTypes||{})[name]||[]),s.trim()]);};
  const remSub=(name,s)=>updSubs(name,((subTypes||{})[name]||[]).filter(v=>v!==s));
  const moveSub=(name,i,dir)=>updSubs(name,moveItem((subTypes||{})[name]||[],i,dir));
  return(<div>
    <div className="card" style={{marginBottom:7}}>
      <div style={{display:"flex",gap:7}}>
        <input placeholder="Add drink type..." value={newItem} onChange={e=>setNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
        <button onClick={onAdd} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button>
      </div>
    </div>
    <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}>
      <span style={{fontSize:"0.72rem",color:T.textMuted}}>Sort:</span>
      <button onClick={()=>onUpdate("types",[...drinks].sort((a,b)=>a.localeCompare(b)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>A→Z</button>
      <button onClick={()=>onUpdate("types",[...drinks].sort((a,b)=>b.localeCompare(a)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>Z→A</button>
    </div>
    {drinks.map((name,i)=>(
      <div key={name} className="card" style={{marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <ReorderBtns i={i} total={drinks.length} onMove={move} T={T}/>
          <IconBtn name={name} category="drink" stored={(icons||{})[name]||""} onSet={ic=>onIconUpdate&&onIconUpdate(name,ic)} T={T}/>
          <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{name}</span>
          <button className="ibtn" onClick={()=>setEi(ei===name?null:name)}>{ei===name?"✖️":"✏️"}</button>
          <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(name)}>🗑️</button>
        </div>
        <input placeholder="Default note (optional)" value={(notes||{})[name]||""} onChange={e=>updNote(name,e.target.value)} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:ei===name?6:0,color:T.textSub}}/>
        {ei===name&&<div style={{marginTop:5}}>
          <div className="slabel">Sub-types</div>
          {((subTypes||{})[name]||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
            <ReorderBtns i={si} total={((subTypes||{})[name]||[]).length} onMove={(idx,dir)=>moveSub(name,idx,dir)} T={T}/>
            <span style={{flex:1}}>{s}</span>
            <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(name,s)}>🗑️</button>
          </div>))}
          <AddInline placeholder="Add sub-type..." onAdd={s=>addSub(name,s)} T={T}/>
        </div>}
      </div>
    ))}
  </div>);
}

function EList({items,onRemove,onReorder,icons,onIconUpdate,newItem,setNew,onAdd,T}){
  return(<div className="card"><div style={{display:"flex",gap:7,marginBottom:9}}><input placeholder="Add new item…" value={newItem} onChange={e=>setNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onAdd()}/><button onClick={onAdd} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div>
  <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}>
    <span style={{fontSize:"0.72rem",color:T.textMuted}}>Sort:</span>
    <button onClick={()=>onReorder&&onReorder([...(items||[])].sort((a,b)=>a.localeCompare(b)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>A→Z</button>
    <button onClick={()=>onReorder&&onReorder([...(items||[])].sort((a,b)=>b.localeCompare(a)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>Z→A</button>
  </div>
  {(items||[]).map((item,i)=>(<div key={item} style={{display:"flex",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${T.border}`,fontSize:"0.82rem"}}>
    {onReorder&&<ReorderBtns i={i} total={(items||[]).length} onMove={(idx,dir)=>onReorder(moveItem(items,idx,dir))} T={T}/>}
    <IconBtn name={item} category="medication" stored={(icons||{})[item]||""} onSet={ic=>onIconUpdate&&onIconUpdate(item,ic)} T={T}/>
    <span style={{flex:1,marginLeft:5}}>{item}</span>
    <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(item)}>🗑️</button>
  </div>))}
  </div>);
}
function ExerciseSetting({types,onChange,T}){
  const[ei,setEi]=useState(null);const[nn,setNn]=useState("");
  const add=()=>{if(!nn.trim())return;onChange([...types,{name:nn.trim(),subTypes:[],metrics:["time"],note:"",icon:""}]);setNn("");};
  const rem=i=>onChange(types.filter((_,x)=>x!==i));
  const move=(i,dir)=>onChange(moveItem(types,i,dir));
  const addSub=(i,s)=>{if(!s.trim())return;onChange(types.map((t,x)=>x===i?{...t,subTypes:[...(t.subTypes||[]),s.trim()]}:t));};
  const remSub=(i,s)=>onChange(types.map((t,x)=>x===i?{...t,subTypes:t.subTypes.filter(v=>v!==s)}:t));
  const moveSub=(i,si,dir)=>onChange(types.map((t,x)=>x===i?{...t,subTypes:moveItem(t.subTypes||[],si,dir)}:t));
  const togM=(i,m)=>onChange(types.map((t,x)=>{if(x!==i)return t;const h=t.metrics.includes(m);return{...t,metrics:h?t.metrics.filter(v=>v!==m):[...t.metrics,m]};}));
  return(<div><div className="card" style={{marginBottom:7}}><div style={{display:"flex",gap:7}}><input placeholder="New exercise type…" value={nn} onChange={e=>setNn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/><button onClick={add} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div><div style={{fontSize:"0.7rem",color:T.textMuted,marginTop:5}}>New types default to time metric. Toggle below to change.</div></div>
  <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}>
    <span style={{fontSize:"0.72rem",color:T.textMuted}}>Sort:</span>
    <button onClick={()=>onChange([...types].sort((a,b)=>a.name.localeCompare(b.name)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>A→Z</button>
    <button onClick={()=>onChange([...types].sort((a,b)=>b.name.localeCompare(a.name)))} style={{padding:"2px 9px",borderRadius:6,border:`1px solid ${T.border}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit"}}>Z→A</button>
  </div>
  {types.map((t,i)=>(<div key={t.name} className="card" style={{marginBottom:7}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:5}}>
      <ReorderBtns i={i} total={types.length} onMove={move} T={T}/>
      <IconBtn name={t.name} category="exercise" stored={t.icon||""} onSet={ic=>onChange(types.map((x,j)=>j===i?{...x,icon:ic}:x))} T={T}/>
      <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{t.name}</span>
      <div style={{display:"flex",gap:5}}><button className="ibtn" onClick={()=>setEi(ei===i?null:i)}>{ei===i?"✖️":"✏️"}</button><button className="ibtn" style={{color:T.danger}} onClick={()=>rem(i)}>🗑️</button></div>
    </div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}>{["distance","time","count"].map(m=>(<button key={m} onClick={()=>togM(i,m)} style={{padding:"2px 9px",borderRadius:20,fontSize:"0.72rem",border:"1px solid",cursor:"pointer",borderColor:t.metrics.includes(m)?T.accentBtn:T.border,background:t.metrics.includes(m)?T.accentBg:"transparent",color:t.metrics.includes(m)?T.accent:T.textMuted}}>{m}</button>))}</div>
    <input placeholder="Default note (optional, e.g. 30 min brisk)" value={t.note||""} onChange={e=>onChange(types.map((x,j)=>j===i?{...x,note:e.target.value}:x))} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:3,color:T.textSub}}/>
    {ei===i&&<div style={{marginTop:7}}><div className="slabel">Sub-types</div>
      {(t.subTypes||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
        <ReorderBtns i={si} total={(t.subTypes||[]).length} onMove={(idx,dir)=>moveSub(i,idx,dir)} T={T}/>
        <span style={{flex:1}}>{s}</span>
        <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(i,s)}>🗑️</button>
      </div>))}
      <AddInline placeholder="Add sub-type…" onAdd={s=>addSub(i,s)} T={T}/>
    </div>}
  </div>))}
  </div>);
}

function AddInline({placeholder,onAdd,T}){
  const[v,setV]=useState("");
  return(<div style={{display:"flex",gap:6,marginTop:6}}><input placeholder={placeholder} value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAdd(v);setV("");}}} style={{fontSize:"0.78rem"}}/><button onClick={()=>{onAdd(v);setV("");}} style={{flexShrink:0,padding:"5px 9px",fontSize:"0.78rem",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div>);
}

root.render(<App/>);
</script>
