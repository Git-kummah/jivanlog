function dayReport(dayEntries,medPresets){
  const mp=medPresets||FD.medicalPresets||[];
  const WTYP=["Warm Water","Plain Water","Cold Water"];
  const liqs=dayEntries.filter(e=>e.type==="liquid");
  const waters=liqs.filter(e=>WTYP.includes(e.liquidType));
  const nonW=liqs.filter(e=>!WTYP.includes(e.liquidType));
  const totalW=waters.reduce((s,e)=>s+(+e.ml||0),0);
  const waterStr=totalW?`${totalW}ml (${[...new Set(waters.map(e=>e.liquidType))].join("/")})`:`-`;
  const drinksStr=nonW.map(e=>`${e.liquidType}${e.ml?" "+e.ml+"ml":""}${e.notes?" ("+e.notes+")":""}`).join("; ")||"-";
  const ex=dayEntries.filter(e=>e.type==="exercise").map(e=>{let s=e.exType;if(e.dist)s+=` ${e.dist}km`;if(e.time)s+=` ${e.time}min`;if(e.count)s+=` x${e.count}`;return s;}).join("; ")||"-";
  const meds=dayEntries.filter(e=>e.type==="medication").map(e=>`${e.med}(${e.timing})`).join("; ")||"-";
  const meals={};["Breakfast","Lunch","Dinner","Snack"].forEach(mt=>{meals[mt]=dayEntries.filter(e=>e.type==="meal"&&e.mealType===mt).map(e=>e.unit==="count"?`${e.food} ${e.qty}`:`${e.food} ${e.qty}${e.unit}`).join(", ")||"-";});
  const medR={};mp.forEach(p=>{const nm=p.name||p;medR[nm]=dayEntries.filter(e=>e.type==="medical"&&e.readingType===nm).map(e=>`${e.value}${e.unit?" "+e.unit:""}`).join(", ")||"-";});
  return{water:waterStr,drinks:drinksStr,medication:meds,exercise:ex,...meals,...medR};
}

function buildAllCSV(entries){
  const hdr=["ID","Date","Time","Type","SubType","Detail1","Detail2","Detail3","Unit","Notes"];
  const rows=[...entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(e=>{
    let t="",st="",d1="",d2="",d3="",u="",n=e.notes||"";
    if(e.type==="meal")      {t="Meal";st=e.mealType;d1=e.food+(e.foodSubType?" · "+e.foodSubType:"");d2=e.qty;u=e.unit;}
    if(e.type==="liquid")    {t="Drinks";st=(e.liquidType||"")+(e.liquidSubType?" · "+e.liquidSubType:"");d1=e.ml||"";u="ml";}
    if(e.type==="exercise")  {t="Exercise";st=e.exType;d1=e.subType||"";d2=e.dist||"";d3=e.time||e.count||"";u=e.dist?"km":e.count?"count":"min";}
    if(e.type==="liquid" && ["Warm Water","Plain Water","Cold Water"].includes(e.liquidType))     {t="Water";st=e.waterTemp||"";d1=e.ml;u="ml";}
    if(e.type==="medical")   {t="Medical";st=e.readingType;d1=e.value;u=e.unit||"";}
    if(e.type==="medication"){t="Medication";st=e.med;d1=e.timing;}
    return[e.id,e.date,fmt24(e.timestamp),t,st,d1,d2,d3,u,n].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",");
  });
  return[hdr.join(","),...rows].join("\n");
}
function buildViewCSV(entries,dates,medPresets){

  return[hdr,...dataRows].join("\n");
}

// ── CSV IMPORT ────────────────────────────────────────────────────────────────
function parseAndMergeCSV(csvText,existingEntries){
  const lines=csvText.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)throw new Error("Empty file");
  const hdrs=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  ["ID","Date","Time","Type"].forEach(r=>{if(!hdrs.includes(r))throw new Error(`Missing column: ${r}`);});
  const col=k=>hdrs.indexOf(k);
  const cell=(row,k)=>{const v=row[col(k)]||"";return v.replace(/^"|"$/g,"").replace(/""/g,'"').trim();};
  const existingIds=new Set(existingEntries.map(e=>e.id));
  const imported=[];
  for(let i=1;i<lines.length;i++){
    const row=[];let cur="",inQ=false;
    for(const ch of lines[i]+","){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){row.push(cur);cur="";}else cur+=ch;}
    const id=cell(row,"ID");if(!id||existingIds.has(id))continue;
    const dateStr=cell(row,"Date");const timeStr=cell(row,"Time")||"00:00";
    const type=cell(row,"Type").toLowerCase();
    const subType=cell(row,"SubType");const d1=cell(row,"Detail1");const d2=cell(row,"Detail2");const d3=cell(row,"Detail3");const unit=cell(row,"Unit");const notes=cell(row,"Notes");
    const parsedDate=dateStr.replace(/(\d+) (\w+) (\d+)/,(m,d,mo,y)=>{const mi=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].indexOf(mo);return`${y}-${String(mi+1).padStart(2,"0")}-${d.padStart(2,"0")}`;});
    const ts=makeTS(parsedDate,timeStr);
    let entry={id,date:parsedDate,timestamp:ts,notes};
    if(type==="meal")       entry={...entry,type:"meal",mealType:subType,food:d1,qty:d2,unit};
    else if(type==="drinks")entry={...entry,type:"drinks",drinkType:subType,ml:d1};
    else if(type==="exercise")entry={...entry,type:"exercise",exType:subType,subType:d1,dist:d2,time:d3,count:d3,unit};
    else if(type==="water"||type==="liquid") entry={...entry,type:"water",waterTemp:subType,ml:d1};
    else if(type==="medical")entry={...entry,type:"medical",readingType:subType,value:d1,unit};
    else if(type==="medication")entry={...entry,type:"medication",med:subType,timing:d1};
    else continue;
    imported.push(entry);
  }
  return imported;
}

// ── DOWNLOAD ──────────────────────────────────────────────────────────────────
function downloadCSV(csv,filename){
  try{const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.setAttribute("download",filename);document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);}catch(e){alert("Download failed: "+e.message);}
}

function App(){
  const[authState,setAuthState]=useState("checking");
  const[authError,setAuthError]=useState(null);
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("home");
  const[locked,setLocked]=useState(false);
  const[entries,setEntries]=useState([]);
  const[settings,setSettings]=useState(deepClone(FD));
  const[defaults,setDefaults]=useState(deepClone(FD));
  const[theme,setTheme]=useState("system");
  const[dataLoaded,setDataLoaded]=useState(false);
  const[clock,setClock]=useState(nowTime());
  const[entryTime,setEntryTime]=useState(nowHHMM());
  const[syncStatus,setSyncStatus]=useState("idle");
  const[showUserMenu,setShowUserMenu]=useState(false);
  const entriesRef=useRef(null);

  const T=theme==="system"?THEMES[sysDark()?"dark":"light"]:(THEMES[theme]||THEMES.dark);

  useEffect(()=>{const t=setInterval(()=>setClock(nowTime()),1000);return()=>clearInterval(t);},[]);

  // ── Auto-backup: once per calendar day on first open ─────────────────────
  useEffect(()=>{
    if(!dataLoaded||!user||!entries.length)return;
    try{
      const key=`jivanlog-lastBackup-${user.uid}`;
      const last=localStorage.getItem(key);
      if(last===today())return;          // already backed up today
      downloadCSV(buildAllCSV(entries),`jivanlog-autobackup-${today()}.csv`);
      localStorage.setItem(key,today());
    }catch(e){console.warn("Auto-backup failed:",e);}
  },[dataLoaded,user]);  // intentionally omit entries — run once when data first loads

  // Auth listener
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(u=>{
      if(u){setUser(u);setAuthState("in");}
      else{setUser(null);setAuthState("out");setDataLoaded(false);setEntries([]);}
    },e=>{setAuthError(e.message);setAuthState("out");});
    return unsub;
  },[]);

  // Real-time entries listener
  useEffect(()=>{
    if(!user){if(entriesRef.current){entriesRef.current();entriesRef.current=null;}return;}
    const ref=fbDb.ref(`users/${user.uid}/entries`);
    const handler=snap=>{setEntries(snap.val()?Object.values(snap.val()):[]);setDataLoaded(true);};
    ref.on("value",handler);
    entriesRef.current=()=>ref.off("value",handler);
    return()=>{ref.off("value",handler);entriesRef.current=null;};
  },[user]);

  // Load settings/templates once on sign-in
  useEffect(()=>{
    if(!user)return;
    (async()=>{
      try{
        const[sett,defs,th]=await Promise.all([
          fbDb.ref(`users/${user.uid}/settings`).get(),
          fbDb.ref(`users/${user.uid}/defaults`).get(),
          fbDb.ref(`users/${user.uid}/theme`).get(),
        ]);
        // Helper: normalise a settings/defaults object
          const norm=o=>{
            if(!o)return o;
            if(o.foodCategories)
              o.foodCategories=o.foodCategories.map(f=>typeof f==="string"?{name:f,note:"",subTypes:[],icon:""}:{note:"",icon:"",...f});
            if(o.exerciseTypes)
              o.exerciseTypes=o.exerciseTypes.map(e=>{
                if(typeof e==="string")return{name:e,metrics:["time"],note:"",subTypes:[],icon:""};
                // Firebase may return array as object {0:"time",1:"distance"} — convert back
                let m=e.metrics;
                if(m&&!Array.isArray(m))m=Object.values(m);
                if(!m||!m.length){
                  // Fall back to FD metrics for known exercise types
                  const fd=(FD.exerciseTypes||[]).find(f=>f.name===e.name);
                  m=fd?fd.metrics:["time"];
                }
                return{...e,metrics:m,note:e.note||"",icon:e.icon||""};
              });
            if(o.medicalPresets)
              o.medicalPresets=o.medicalPresets.map(p=>typeof p==="string"?{name:p,unit:"",icon:""}:{icon:"",...p});
            return o;
          };
          const s=sett.exists()?norm(sett.val()):null;
          const d=defs.exists()?norm(defs.val()):null;
          if(d)setDefaults(d);
          if(s){
            // Merge defaults config fields into settings so entry forms always
            // reflect the user's latest custom config without needing Apply
            const merged=d?{...s,
              foodCategories:d.foodCategories||s.foodCategories,
              liquidTypes:d.liquidTypes||s.liquidTypes,
              liquidNotes:{...( s.liquidNotes||{}), ...(d.liquidNotes||{})},
              liquidSubTypes:{...(s.liquidSubTypes||{}),...(d.liquidSubTypes||{})},
              liquidIcons:{...(s.liquidIcons||{}),...(d.liquidIcons||{})},
              exerciseTypes:d.exerciseTypes||s.exerciseTypes,
              medicalPresets:d.medicalPresets||s.medicalPresets,
              medications:d.medications||s.medications,
              medicationIcons:{...(s.medicationIcons||{}),...(d.medicationIcons||{})},
            }:s;
            setSettings(merged);
          } else if(d){
            setSettings(deepClone(d));
          }
        if(th.exists())setTheme(th.val());
      }catch(e){console.error("Settings load:",e);}
    })();
  },[user]);

  // Persist helpers
  const persistEntries=useCallback(async arr=>{
    if(!user)return;
    setSyncStatus("saving");
    try{
      const obj=arr.reduce((acc,e)=>{acc[e.id]=e;return acc;},{});
      await fbDb.ref(`users/${user.uid}/entries`).set(arr.length?obj:null);
      setSyncStatus("saved");setTimeout(()=>setSyncStatus("idle"),1500);
    }catch(e){setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);}
  },[user]);

  const persistKey=useCallback(async(key,val)=>{
    if(!user)return;
    try{await dbSet(user.uid,key,val);}catch(e){console.error("Persist:",key,e);}
  },[user]);

  const saveEntries  =useCallback(n=>{persistEntries(n);},[persistEntries]);
  const saveSettings =useCallback(n=>{setSettings(n);persistKey("settings",n);},[persistKey]);
  const saveDefaults =useCallback(n=>{setDefaults(n);persistKey("defaults",n);},[persistKey]);
  const saveTheme    =useCallback(m=>{setTheme(m);   persistKey("theme",m);},[persistKey]);

  const addEntry=useCallback(entry=>{
    const[h,mm]=entryTime.split(":").map(Number);
    const d=new Date();d.setHours(h,mm,0,0);
    saveEntries([...entries,{...entry,id:genId(),timestamp:d.toISOString(),date:today()}]);
  },[entries,saveEntries,entryTime]);

  const updateEntry=useCallback((id,data)=>saveEntries(entries.map(e=>e.id===id?{...e,...data}:e)),[entries,saveEntries]);
  const deleteEntry=useCallback(id=>saveEntries(entries.filter(e=>e.id!==id)),[entries,saveEntries]);

  const clearAll=useCallback(()=>{
    if(!confirm("CLEAR ALL DATA?\n\nAll entries permanently deleted.\nBackup CSV downloads first.\n\nPress OK to continue."))return;
    if(!confirm("FINAL CONFIRMATION\n\nPress OK to download backup then clear."))return;
    downloadCSV(buildAllCSV(entries),`jivanlog-backup-${today()}.csv`);
    setTimeout(async()=>{if(user)try{await dbDel(user.uid,"entries");}catch(e){}},500);
  },[entries,user]);

  const onClearAll=useCallback(async()=>{
    downloadCSV(buildAllCSV(entries),`jivanlog-backup-full-${today()}.csv`);
    if(user){try{
      await Promise.all([dbDel(user.uid,"entries"),dbDel(user.uid,"settings"),dbDel(user.uid,"defaults"),dbDel(user.uid,"theme")]);
      const empty={foodCategories:[],liquidTypes:[],liquidNotes:{},liquidSubTypes:{},exerciseTypes:[],medicalPresets:[],medications:[]};
      setSettings({...empty});setDefaults({...empty});setTheme("system");
    }catch(e){console.error(e);}}
  },[entries,user]);

  const onClearEntries=useCallback(async()=>{
    if(user)try{await dbDel(user.uid,"entries");}catch(e){}
  },[user]);

  const onClearConfig=useCallback(async section=>{
    const emptyMap={
      food:{foodCategories:[]},
      drinks:{liquidTypes:[],liquidNotes:{},liquidSubTypes:{}},
      exercise:{exerciseTypes:[]},
      medical:{medicalPresets:[]},
      meds:{medications:[]},
    };
    const patch=emptyMap[section]||{};
    const newDef={...defaults,...patch};const newSet={...settings,...patch};
    setDefaults(newDef);setSettings(newSet);
    if(user){try{await Promise.all([dbSet(user.uid,"defaults",newDef),dbSet(user.uid,"settings",newSet)]);}catch(e){}}
  },[defaults,settings,user]);

  const onImportConfig=useCallback(async cfg=>{
    const newDef={...defaults,...cfg};const newSet={...settings,...cfg};
    setDefaults(newDef);setSettings(newSet);
    if(user){try{await Promise.all([dbSet(user.uid,"defaults",newDef),dbSet(user.uid,"settings",newSet)]);}catch(e){}}
    alert("✓ Config imported successfully.");
  },[defaults,settings,user]);

  const handleImport=useCallback(async csvText=>{
    try{
      const imported=parseAndMergeCSV(csvText,entries);
      if(!imported.length){alert("No new entries found — all IDs already exist.");return;}
      if(!confirm(`Import ${imported.length} new entries?\nDuplicates are skipped.\nPress OK to merge.`))return;
      saveEntries([...entries,...imported]);
      alert(`✓ Imported ${imported.length} entries.`);
    }catch(e){alert("Import failed: "+e.message);}
  },[entries,saveEntries]);

  const signOut=async()=>{
    if(!confirm("Sign out of JivanLog?\nYour data is saved to Firebase."))return;
    await fbAuth.signOut();setEntries([]);setDataLoaded(false);setLocked(false);
  };

  if(authState==="checking")return<LoadingScreen message="Checking sign-in…"/>;
  if(authState==="out")return<LoginScreen error={authError}/>;
  if(!dataLoaded)return<LoadingScreen message="Loading your data…"/>;

  const dayStr=new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});

  return(
    <div style={{maxWidth:480,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:T.bg,color:T.text,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px}
        input,select,textarea{background:${T.inputBg};color:${T.text};border:1px solid ${T.border};border-radius:8px;padding:7px 9px;font-family:inherit;font-size:0.83rem;outline:none;width:100%}
        input:focus,select:focus{border-color:${T.accent}}
        select option{background:${T.inputBg}}
        button{cursor:pointer;font-family:inherit}
        .card{background:${T.cardBg};border:1px solid ${T.border};border-radius:12px;padding:11px;margin-bottom:8px}
        .slabel{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.09em;color:${T.textMuted};margin-bottom:5px;font-weight:600}
        .tle{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid ${T.border}22}
        .tle:last-child{border-bottom:none}
        .tbtn{padding:5px 10px;font-size:0.79rem;border-radius:8px;background:${T.cardBg};color:${T.textMuted};border:1px solid ${T.border};white-space:nowrap;cursor:pointer;font-family:inherit;font-weight:500}
        .tbtn.on{background:${T.accentBg};color:${T.accent};border-color:${T.accentBtn};font-weight:600}
        .wbtn{background:${T.waterBtn};color:${T.waterBtnText};border:1px solid ${T.border};padding:7px 12px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer}
        .wbtn:hover{background:${T.accentBtn};color:#fff}
        .ibtn{background:none;border:none;padding:3px 5px;border-radius:6px;color:${T.textMuted};font-size:0.82rem;cursor:pointer}
        .ibtn:hover{background:${T.border};color:${T.text}}
        .ctbl{width:100%;border-collapse:collapse;font-size:0.73rem}
        .ctbl th{background:${T.navBg};color:${T.textMuted};padding:5px 6px;text-align:left;border:1px solid ${T.border};font-weight:600;white-space:nowrap}
        .ctbl td{padding:5px 6px;border:1px solid ${T.border};vertical-align:top;word-break:break-word}
        .ctbl tr:nth-child(even) td{background:${T.even}}
        input[type=number]::-webkit-inner-spin-button{opacity:0.4}
        input[type=time]{color-scheme:${theme==="light"?"light":"dark"}}
        input[type=date]{color-scheme:${theme==="light"?"light":"dark"}}
        .tpl-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid ${T.border}22;font-size:0.82rem}
        .tpl-row:last-child{border-bottom:none}
        .tpl-chk{width:18px;height:18px;accent-color:${T.accentBtn};flex-shrink:0;cursor:pointer}
      `}</style>

      {locked&&<LockScreen T={T} onUnlock={()=>setLocked(false)}/>}

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px 7px",background:T.navBg,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <img src={LOGO_SVG} style={{width:32,height:32,borderRadius:8}} alt="logo"/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:"0.95rem",color:T.accent,lineHeight:1.1}}>JivanLog</div>
          <div style={{fontSize:"0.68rem",color:T.textMuted,fontFamily:"'DM Mono',monospace"}}>{dayStr}<span style={{opacity:0.45,marginLeft:5}}>{APP_VERSION}</span></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div title={syncStatus==="saving"?"Saving…":syncStatus==="saved"?"Saved ✓":syncStatus==="error"?"Sync error":"Synced"} style={{fontSize:"0.8rem",color:syncStatus==="saving"?T.textMuted:syncStatus==="saved"?T.accent:syncStatus==="error"?T.danger:T.border,transition:"color 0.3s"}}>
            {syncStatus==="saving"?"⟳":syncStatus==="saved"?"✓":syncStatus==="error"?"!":"☁"}
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.88rem",color:T.waterBtnText}}>{clock}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"12px 13px"}} onClick={()=>showUserMenu&&setShowUserMenu(false)}>
        {page==="home"    &&<HomePage entries={entries} settings={settings} onAdd={addEntry} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
        {page==="manage"  &&<ManagePage entries={entries} settings={settings} onUpdate={updateEntry} onDelete={deleteEntry} T={T}/>}
        {page==="reports" &&<ReportsPage entries={entries} settings={settings} T={T}/>}
        {page==="settings"&&<SettingsPage settings={settings} defaults={defaults} theme={theme} setSettings={saveSettings} setDefaults={saveDefaults} setTheme={saveTheme} user={user} entries={entries} onImport={handleImport} clearAll={clearAll} onImportConfig={onImportConfig} onClearEntries={onClearEntries} onClearConfig={onClearConfig} onClearAll={onClearAll} T={T}/>}
      </div>

      <nav style={{display:"flex",background:T.navBg,borderTop:`1px solid ${T.border}`,flexShrink:0,alignItems:"center"}}>
        {[["home","🏠","Home"],["manage","📋","Manage"],["reports","📊","Reports"],["settings","⚙️","Settings"]].map(([p,ic,lb])=>(
          <button key={p} title={lb} onClick={()=>setPage(p)} style={{flex:1,padding:"9px 0 7px",textAlign:"center",fontSize:"1.3rem",background:"none",border:"none",color:page===p?T.accent:T.textMuted,borderRadius:0,cursor:"pointer",transition:"color 0.15s"}}>{ic}</button>
        ))}
        {/* User avatar button — tap for lock/sign-out menu */}
        <div style={{position:"relative",flex:1,display:"flex",justifyContent:"center"}}>
          <button title={user.displayName||user.email} onClick={()=>setShowUserMenu(v=>!v)}
            style={{background:"none",border:"none",cursor:"pointer",padding:"5px 0 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            {user.photoURL
              ?<img src={user.photoURL} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${showUserMenu?T.accentBtn:T.border}`}} alt="avatar"/>
              :<div style={{width:28,height:28,borderRadius:"50%",background:T.accentBtn,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",fontWeight:700}}>{(user.displayName||user.email||"U")[0].toUpperCase()}</div>}
            <div style={{fontSize:"0.5rem",color:T.textMuted,fontFamily:"inherit"}}>Account</div>
          </button>
          {showUserMenu&&<div style={{position:"absolute",bottom:"100%",right:0,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:12,padding:8,minWidth:180,boxShadow:"0 -4px 16px #0004",zIndex:200}}>
            <div style={{padding:"6px 10px 8px",borderBottom:`1px solid ${T.border}`,marginBottom:6}}>
              <div style={{fontWeight:600,fontSize:"0.82rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||"User"}</div>
              <div style={{fontSize:"0.68rem",color:T.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
            </div>
            <button onClick={()=>{setShowUserMenu(false);if(confirm("Lock JivanLog?\nYour data is saved."))setLocked(true);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"none",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:"0.82rem",color:T.text}}>🔒 Lock session</button>
            <button onClick={()=>{setShowUserMenu(false);signOut();}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",background:"none",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:"0.82rem",color:T.danger}}>↩ Sign out</button>
          </div>}
        </div>
      </nav>
    </div>
  );
}

// HOME

function HomePage({entries,settings,onAdd,entryTime,setEntryTime,T}){
  const[active,setActive]=useState("meal");
  const todayE=entries.filter(e=>e.date===today()).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const switchModule=m=>{setActive(m);setEntryTime(nowHHMM());};
  const MODULE_ITEMS=[["meal","Meal","🍽️"],["liquid","Liquids","💧"],["exercise","Exercise","🏃"],["medical","Medical","🩺"],["medication","Medication","💊"]];
  return(
    <div>
      <div style={{display:"flex",gap:5,marginBottom:10,alignItems:"center"}}>
        <div style={{display:"flex",gap:5,flex:1,overflowX:"auto",paddingBottom:2}}>
          {MODULE_ITEMS.map(([m,lb,ic])=>(
            <button key={m} title={lb} onClick={()=>switchModule(m)} style={{flexShrink:0,padding:"6px 10px",borderRadius:9,border:"1px solid",fontSize:"1.05rem",cursor:"pointer",borderColor:active===m?T.accentBtn:T.border,background:active===m?T.accentBg:T.cardBg,color:active===m?T.accent:T.textMuted}}>{ic}</button>
          ))}
        </div>

      </div>
      {active==="meal"      &&<MealEntry settings={settings} onAdd={onAdd} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
      {active==="liquid"    &&<LiquidEntry settings={settings} onAdd={onAdd} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
      {active==="exercise"  &&<ExerciseEntry settings={settings} onAdd={onAdd} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
      {active==="medical"   &&<MedicalEntry settings={settings} onAdd={onAdd} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
      {active==="medication"&&<MedEntry settings={settings} onAdd={onAdd} entryTime={entryTime} setEntryTime={setEntryTime} T={T}/>}
      <div style={{marginTop:14}}>
        <div className="slabel">Today's Log</div>
        {todayE.length===0?<div style={{color:T.textMuted,fontSize:"0.8rem",textAlign:"center",padding:"18px 0"}}>No entries yet today</div>:<div className="card" style={{padding:"8px 11px"}}>{todayE.map(e=><TLE key={e.id} e={e} settings={settings} T={T}/>)}</div>}
      </div>
    </div>
  );
}

// ── Shared time-input blur normaliser ────────────────────────────────────────
const normTime=setter=>e=>{
  const raw=e.target.value.replace(/[^0-9]/g,"");
  if(!raw)return;
  let h,mi;
  if(raw.length<=2){h=+raw;mi=0;}
  else if(raw.length===3){h=+raw[0];mi=+raw.slice(1);}
  else{h=+raw.slice(0,2);mi=+raw.slice(2,4);}
  h=Math.min(23,Math.max(0,h));mi=Math.min(59,Math.max(0,mi));
  setter(String(h).padStart(2,"0")+":"+String(mi).padStart(2,"0"));
};
// ── Shared time input element ─────────────────────────────────────────────────
const TimeInput=({value,onChange,T})=>(
  <input type="text" title="Entry time" placeholder="9.20" value={value}
    onChange={e=>onChange(e.target.value)} onBlur={normTime(onChange)}
    maxLength={5} style={{width:58,fontSize:"0.8rem",padding:"6px 4px",
    fontFamily:"'DM Mono',monospace",textAlign:"center",flexShrink:0}}/>
);

function MealEntry({settings,onAdd,entryTime,setEntryTime,T}){
  const[mt,setMt]=useState(autoMeal);const[food,setFood]=useState("");const[foodSub,setFoodSub]=useState("");const[qty,setQty]=useState("");const[unit,setUnit]=useState("g");const[notes,setNotes]=useState("");const[fl,setFl]=useState(false);
  const foods=foodItems(settings.foodCategories||FD.foodCategories);
  const foodObj=foods.find(f=>f.name===food);
  const hasFoodSub=foodObj?.subTypes?.length>0;
  const onFoodChange=name=>{setFood(name);setFoodSub("");const fi=foods.find(f=>f.name===name);setNotes(fi?.note||"");};
  useEffect(()=>{if(food){const fi=foods.find(f=>f.name===food);setNotes(fi?.note||"");}},[settings]);
  const save=()=>{if(!food||!qty)return;onAdd({type:"meal",mealType:mt,food,foodSubType:foodSub,qty,unit,notes});setFood("");setFoodSub("");setQty("");setNotes("");setFl(true);setTimeout(()=>setFl(false),1200);};
  return(<div className="card"><div className="slabel">🍽️ Meal</div><div style={{display:"flex",gap:5,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}><select value={mt} onChange={e=>setMt(e.target.value)} style={{flex:"0 0 95px"}}>{MEAL_TYPES.map(m=><option key={m}>{m}</option>)}</select><select value={food} onChange={e=>onFoodChange(e.target.value)} style={{flex:"2 1 80px",minWidth:0}}><option value="">Food item…</option>{[...foods].sort((a,b)=>a.name.localeCompare(b.name)).map(f=><option key={f.name} value={f.name}>{pickIcon(f.name,"food",f.icon||"")} {f.name}</option>)}</select>{hasFoodSub&&<select value={foodSub} onChange={e=>setFoodSub(e.target.value)} style={{flex:"1 1 90px",minWidth:0}}><option value="">Sub-type…</option>{foodObj.subTypes.map(s=><option key={s}>{s}</option>)}</select>}<input type="number" placeholder="Qty" value={qty} onChange={e=>setQty(e.target.value)} style={{flex:"0 0 54px",width:54}}/><select value={unit} onChange={e=>setUnit(e.target.value)} style={{flex:"0 0 60px",width:60}}>{FOOD_UNITS.map(u=><option key={u}>{u}</option>)}</select></div><div style={{display:"flex",gap:6,alignItems:"center"}}><TimeInput value={entryTime} onChange={setEntryTime}/><input placeholder="Notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)} style={{flex:1}}/><Saver flash={fl} onClick={save} T={T}/></div></div>);
}
function LiquidEntry({settings,onAdd,entryTime,setEntryTime,T}){
  const allTypes=(settings.liquidTypes||FD.liquidTypes||[]);
  const liqNotes=settings.liquidNotes||FD.liquidNotes||{};
  const liqSubTypes=settings.liquidSubTypes||FD.liquidSubTypes||{};
  const liqIcons=settings.liquidIcons||{};
  const[liqType,setLiqType]=useState("Warm Water");
  const[liqSub,setLiqSub]=useState("");
  const[ml,setMl]=useState("");
  const[notes,setNotes]=useState("");
  const[fl,setFl]=useState(false);
  const add=amt=>setMl(s=>String((+s||0)+amt));
  const curSubTypes=liqSubTypes[liqType]||[];
  const hasLiqSub=curSubTypes.length>0;
  const onTypeChange=t=>{setLiqType(t);setLiqSub("");setNotes(liqNotes[t]||"");};
  // Re-seed notes when Firebase settings arrive (async load)
  useEffect(()=>{setNotes(liqNotes[liqType]||"");},[settings,liqType]);
  const save=()=>{if(!ml||+ml<=0)return;onAdd({type:"liquid",liquidType:liqType,liquidSubType:liqSub,ml:+ml,notes});setMl("");setLiqSub("");setNotes(liqNotes[liqType]||"");setFl(true);setTimeout(()=>setFl(false),1200);};
  return(<div className="card"><div className="slabel">💧 Liquids</div>
    {/* Row 1: dropdown | quick-add buttons | qty */}
    <div style={{display:"flex",gap:5,marginBottom:7,alignItems:"center",flexWrap:"wrap"}}>
      <select value={liqType} onChange={e=>onTypeChange(e.target.value)} style={{flex:"2 1 110px",minWidth:0}}>
        {allTypes.map((t,i)=>t==="--------"?<option key={i} disabled>── Drinks ──</option>:<option key={t}>{pickIcon(t,"drink",liqIcons[t]||"")} {t}</option>)}
      </select>
      {hasLiqSub&&<select value={liqSub} onChange={e=>setLiqSub(e.target.value)} style={{flex:"1 1 90px",minWidth:0}}><option value="">Sub-type…</option>{curSubTypes.map(s=><option key={s}>{s}</option>)}</select>}
      {[500,250,100,50].map(amt=><button key={amt} className="wbtn" onClick={()=>add(amt)} style={{padding:"5px 7px",fontSize:"0.78rem",flex:"0 0 auto"}}>{"+"+amt}</button>)}
      <input type="number" placeholder="ml" value={ml} onChange={e=>setMl(e.target.value)} style={{flex:"0 0 58px",textAlign:"center"}}/>

// ── Auto-derive medication timing from current time ─────────────────────────
function autoMedTiming(timeStr){
  const[h,m]=timeStr.split(":").map(Number);
  const mins=h*60+(m||0);
  if(mins<10*60)return"Before breakfast";
  if(mins<11*60)return"After breakfast";
  if(mins<13*60)return"Before lunch";
  if(mins<14*60)return"After lunch";
  if(mins<20*60)return"Before dinner";
  if(mins<22*60)return"After dinner";
  return"Bedtime";
}

// ═══════════════════════════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════════════════════════
function parseMedVal(v){
  if(!v)return null;
  // BP: "120/80" → take systolic only for primary line; expose both
  if(typeof v==="string"&&v.includes("/")){
    const [s,d]=v.split("/").map(Number);
    return isNaN(s)?null:{sys:s,dia:isNaN(d)?null:d};
  }
  const n=parseFloat(v);
  return isNaN(n)?null:n;
}

function isoWeek(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const day=d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const y=d.getFullYear();
  const start=new Date(y,0,1);
  const w=Math.ceil((((d-start)/86400000)+1)/7);
  return `${y}-W${String(w).padStart(2,"0")}`;
}
function isoMonth(dateStr){return dateStr.slice(0,7);}
function isoYear(dateStr){return dateStr.slice(0,4);}

// Build {label, values:[]} series for a given metric, range and aggregation
function buildTrendSeries(entries, metricName, rangeKey, aggMode){
  // Filter medical entries for this metric
  const med=entries.filter(e=>e.type==="medical"&&(e.readingType||e.detail1)===metricName);
  if(!med.length)return null;

  const now=new Date();
  // Date boundaries
  const cutoffs={
    "7d":  7,  "30d": 30, "90d": 90,
    "12w": 84, "25w":175, "12m":365
  };
  const days=cutoffs[rangeKey]||30;
  const cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-days);
  const inRange=med.filter(e=>new Date(e.date+"T00:00:00")>=cutoff);

  // Group key function
  const isWeekly=rangeKey==="12w"||rangeKey==="25w";
  const isMonthly=rangeKey==="12m";
  const groupFn=isMonthly?isoMonth:isWeekly?isoWeek:d=>d;

  // Bucket entries
  const buckets={};
  inRange.forEach(e=>{
    const key=groupFn(e.date);
    if(!buckets[key])buckets[key]=[];
    const raw=e.value??e.detail2??e.detail1;
    const v=parseMedVal(raw);
    if(v!==null)buckets[key].push({v,ts:e.timestamp||e.date,date:e.date});
  });

  const sortedKeys=Object.keys(buckets).sort();

  // Aggregate per bucket
  function aggBucket(items){
    if(!items.length)return null;
    // Sort helpers — sort items[] by date+time ascending/descending
    const asc=(a,b)=>a.ts.localeCompare(b.ts);
    const desc=(a,b)=>b.ts.localeCompare(a.ts);
    const isBP=typeof items[0].v==="object";
    if(isBP){
      // Sort items chronologically, then pick first or last by position
      const sortedAsc=[...items].filter(i=>i.v&&i.v.sys!==null).sort(asc);
      const sortedDesc=[...items].filter(i=>i.v&&i.v.sys!==null).sort(desc);
      if(!sortedAsc.length)return null;
      if(aggMode==="first")return{sys:sortedAsc[0].v.sys,dia:sortedAsc[0].v.dia,isBP:true};
      if(aggMode==="last") return{sys:sortedDesc[0].v.sys,dia:sortedDesc[0].v.dia,isBP:true};
      // avg
      const sysMean=Math.round(sortedAsc.reduce((s,i)=>s+i.v.sys,0)/sortedAsc.length);
      const validDia=sortedAsc.filter(i=>i.v.dia!==null);
      const diaMean=validDia.length?Math.round(validDia.reduce((s,i)=>s+i.v.dia,0)/validDia.length):null;
      return{sys:sysMean,dia:diaMean,isBP:true};
    }
    const valid=items.filter(i=>typeof i.v==="number");
    if(!valid.length)return null;
    if(aggMode==="first")return valid.slice().sort(asc)[0].v;
    if(aggMode==="last") return valid.slice().sort(desc)[0].v;
    return Math.round((valid.reduce((s,i)=>s+i.v,0)/valid.length)*10)/10;
  }

  const labels=[];const primary=[];const secondary=[];
  sortedKeys.forEach(k=>{
    const agg=aggBucket(buckets[k]);
    if(agg===null)return;
    // Format label
    if(isMonthly)labels.push(k.slice(0,7)); // YYYY-MM
    else if(isWeekly)labels.push(k);         // YYYY-Www
    else labels.push(k.slice(5));             // MM-DD
    if(agg&&agg.isBP){
      primary.push(agg.sys);secondary.push(agg.dia);
    } else {
      primary.push(agg);
    }
  });
  return{labels,primary,secondary,isBP:primary.length&&buckets[sortedKeys[0]]&&typeof aggBucket(buckets[sortedKeys[0]])==="object"&&aggBucket(buckets[sortedKeys[0]])&&aggBucket(buckets[sortedKeys[0]]).isBP};
}

const TREND_RANGES=[
  {key:"7d",  label:"7 Days"},
  {key:"30d", label:"30 Days"},
  {key:"90d", label:"90 Days"},
  {key:"12w", label:"12 Weeks"},
  {key:"25w", label:"25 Weeks"},
  {key:"12m", label:"12 Months"},
];
const AGG_MODES=[
  {key:"avg",   label:"Avg"},
  {key:"first", label:"First"},
  {key:"last",  label:"Last"},
];

function TrendsPanel({entries,settings,T}){
  const[metric,setMetric]=React.useState("Sugar");

  const[agg,setAgg]=React.useState("avg");

  // Resolve available metrics from settings
  const medPresets=settings.medicalPresets||FD.medicalPresets;

  React.useEffect(()=>{

    // Destroy previous chart
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}

    if(!series||!series.labels.length){

      ctx.clearRect(0,0,canvas.width,canvas.height);

    const gridColor=isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)";

    const datasets=[];
    const rangeLabel=TREND_RANGES.find(r=>r.key===range)?.label||range;
    const aggLabel=AGG_MODES.find(a=>a.key===agg)?.label||agg;

    if(series.isBP){

        borderColor:bc,backgroundColor:bgc,
        tension:0.35,pointRadius:3,pointHoverRadius:6,fill:true,
      });
    }

    // Unit for Y axis
    const unit=(()=>{
      const p=medPresets.find(p=>(typeof p==="string"?p:p.name)===metric);
      return p&&typeof p==="object"?p.unit||"":"";
    })();

    const ctx=canvas.getContext("2d");
    chartRef.current=new Chart(ctx,{
      type:"line",
      data:{labels:series.labels,datasets},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:true,labels:{color:textColor,font:{size:11}}},
          tooltip:{

              label:ctx=>{

              }
            }
          }
        },
        scales:{
          x:{ticks:{color:textColor,maxRotation:45,font:{size:10}},grid:{color:gridColor}},
          y:{ticks:{color:textColor,font:{size:10},callback:(v)=>unit?`${v} ${unit}`:v},grid:{color:gridColor}},
        }
      }
    });

    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[metric,range,agg,entries,T]);

  // Count data points for selected metric
  const dataCount=entries.filter(e=>e.type==="medical"&&(e.readingType||e.detail1)===metric).length;

  return(<div>
    <div className="card" style={{marginBottom:8}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {(availMetrics.length?availMetrics:TREND_METRICS).map(m=>(

            style={{fontSize:"0.78rem"}}>{m}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {TREND_RANGES.map(r=>(
          <button key={r.key} onClick={()=>setRange(r.key)}
            className={`tbtn${range===r.key?" on":""}`}
            style={{fontSize:"0.75rem",padding:"4px 8px"}}>{r.label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:5,marginBottom:4,alignItems:"center"}}>
        <span style={{fontSize:"0.72rem",color:T.textMuted}}>Reading:</span>
        {AGG_MODES.map(a=>(

      </div>

        {(range==="12w"||range==="25w")?" · Weekly buckets"
          :range==="12m"?" · Monthly buckets"

    </div>
  </div>);

// ── Config CSV export/import helpers ─────────────────────────────────────────
// Each section exports as its own CSV with a sentinel header row
// Sentinel: #JivanLog-Config-<section>-<version>

function csvCell(v){
  const s=String(v==null?"":v);
  return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`  :s;
}
function csvRow(arr){return arr.map(csvCell).join(",");}

function exportConfigCSV(settings,section){
  const lines=[];
  if(section==="all"||section==="food"){
    lines.push(`#JivanLog-Config-food-${APP_VERSION}`);
    lines.push(csvRow(["Name","Note","SubTypes"]));
    foodItems(settings.foodCategories||FD.foodCategories).forEach(f=>{
      lines.push(csvRow([f.name,f.note||"",(f.subTypes||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="drinks"){
    lines.push(`#JivanLog-Config-drinks-${APP_VERSION}`);
    lines.push(csvRow(["Name","Note","SubTypes"]));
    const types=(settings.liquidTypes||FD.liquidTypes).filter(t=>t!=="--------");
    const notes=settings.liquidNotes||FD.liquidNotes||{};
    const subs=settings.liquidSubTypes||FD.liquidSubTypes||{};
    types.forEach(t=>{
      lines.push(csvRow([t,notes[t]||"",(subs[t]||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="exercise"){
    lines.push(`#JivanLog-Config-exercise-${APP_VERSION}`);
    lines.push(csvRow(["Name","Metrics","Note","SubTypes"]));
    (settings.exerciseTypes||FD.exerciseTypes).forEach(e=>{
      lines.push(csvRow([e.name,(e.metrics||[]).join(";"),e.note||"",(e.subTypes||[]).join(";")]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="medical"){
    lines.push(`#JivanLog-Config-medical-${APP_VERSION}`);
    lines.push(csvRow(["Name","Unit"]));
    (settings.medicalPresets||FD.medicalPresets).forEach(p=>{
      lines.push(csvRow([typeof p==="string"?p:p.name,typeof p==="string"?"":p.unit||""]));
    });
    if(section==="all")lines.push("");
  }
  if(section==="all"||section==="meds"){
    lines.push(`#JivanLog-Config-meds-${APP_VERSION}`);
    lines.push(csvRow(["Name"]));
    (settings.medications||FD.medications).forEach(m=>lines.push(csvCell(m)));
  }
  return lines.join("\n");
}

function importConfigCSV(csvText){
  // Splits multi-section "all" exports or handles single-section files
  const lines=csvText.split("\n").map(l=>l.trim());
  const result={};
  let section=null,headers=[];
  const parseCells=line=>{
    const row=[];let cur="",inQ=false;
    for(const ch of line+","){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){row.push(cur.replace(/""/g,'"'));cur="";}
      else cur+=ch;
    }
    return row;
  };
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(!line)continue;
    // Sentinel row
    const sm=line.match(/^#JivanLog-Config-(\w+)-/);
    if(sm){section=sm[1];headers=[];continue;}
    if(!section)continue;
    // Header row (first non-sentinel, non-empty row after sentinel)
    if(!headers.length){headers=parseCells(line).map(h=>h.toLowerCase());continue;}
    const cells=parseCells(line);
    const get=h=>cells[headers.indexOf(h)]||"";
    const spl=v=>v?v.split(";").map(s=>s.trim()).filter(Boolean):[];

    if(section==="food"){
      if(!result.foodCategories)result.foodCategories=[];
      result.foodCategories.push({name:get("name"),note:get("note"),subTypes:spl(get("subtypes"))});
    }
    if(section==="drinks"){
      if(!result.liquidTypes)result.liquidTypes=[];
      if(!result.liquidNotes)result.liquidNotes={};
      if(!result.liquidSubTypes)result.liquidSubTypes={};
      const name=get("name");if(!name)continue;
      result.liquidTypes.push(name);
      if(get("note"))result.liquidNotes[name]=get("note");
      const subs=spl(get("subtypes"));if(subs.length)result.liquidSubTypes[name]=subs;
    }
    if(section==="exercise"){
      if(!result.exerciseTypes)result.exerciseTypes=[];
      result.exerciseTypes.push({name:get("name"),metrics:spl(get("metrics")),note:get("note"),subTypes:spl(get("subtypes"))});
    }
    if(section==="medical"){
      if(!result.medicalPresets)result.medicalPresets=[];
      result.medicalPresets.push({name:get("name"),unit:get("unit")});
    }
    if(section==="meds"){
      if(!result.medications)result.medications=[];
      const name=cells[0]||"";if(name&&!name.startsWith("#"))result.medications.push(name);
    }
  }
  if(!Object.keys(result).length)throw new Error("No config data found — check file format");
  return result;
}

      {ctab==="medical"&&<MedicalPresetSetting presets={active.medicalPresets||FD.medicalPresets} onAdd={addMedPreset} onRemove={removeMedPreset} onReorder={arr=>updateActive(p=>({...p,medicalPresets:arr}))} onUpdate={arr=>updateActive(p=>({...p,medicalPresets:arr}))} T={T}/>}

    {stab==="backup"&&<BackupPanel entries={entries} settings={settings} defaults={defaults} onImport={onImport} onImportConfig={onImportConfig} onClearEntries={onClearEntries} onClearConfig={onClearConfig} onClearAll={onClearAll} T={T}/>}
  </div>);

function BackupPanel({entries,settings,defaults,onImport,onImportConfig,onClearEntries,onClearConfig,onClearAll,T}){
  const dataRef=useRef();
  const cfgRef=useRef();
  const[section,setSection]=useState("entries"); // entries | config
  const[cfgSub,setCfgSub]=useState("all");       // all | food | drinks | exercise | medical | meds
  const[entrySub,setEntrySub]=useState("all");   // all | meal | liquid | exercise | medical | medication
  const[showClear,setShowClear]=useState(false);

  const ENTRY_SUBS=[["all","All entries"],["meal","🍽️ Food"],["liquid","💧 Drinks"],["exercise","🏃 Exercise"],["medical","🩺 Medical"],["medication","💊 Meds"]];
  const CFG_SUBS=[["all","All config"],["food","🍽️ Food"],["drinks","💧 Drinks"],["exercise","🏃 Exercise"],["medical","🩺 Medical Readings"],["meds","💊 Medications"]];
  const CLEAR_OPTS=[
    {key:"all",   label:"⚠️ Clear EVERYTHING",  desc:"All entries + all config + theme. Full reset.",danger:true},
    {key:"entries",label:"🗑️ Clear all entries", desc:"Delete all logged entries. Config is kept."},
    {key:"food",   label:"🍽️ Clear Food config",    desc:"Delete all food items. List becomes empty. Entries are kept."},
    {key:"drinks", label:"💧 Clear Drinks config",  desc:"Delete all drink types. List becomes empty. Entries are kept."},
    {key:"exercise",label:"🏃 Clear Exercise config",desc:"Delete all exercise types. List becomes empty. Entries are kept."},
    {key:"medical",label:"🩺 Clear Medical config",  desc:"Delete all medical reading types. List becomes empty. Entries are kept."},
    {key:"meds",   label:"💊 Clear Meds config",     desc:"Delete all medications. List becomes empty. Entries are kept."},
  ];

  const doExport=()=>{
    if(section==="entries"){
      const filtered=entrySub==="all"?entries:entries.filter(e=>e.type===entrySub);
      const label=entrySub==="all"?"all":entrySub;
      downloadCSV(buildAllCSV(filtered),`jivanlog-entries-${label}-${today()}.csv`);
    } else {
      downloadCSV(exportConfigCSV(settings,cfgSub),`jivanlog-config-${cfgSub}-${today()}.csv`);
    }
  };

  const handleDataFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      if(section==="entries")onImport(ev.target.result);
      else{try{const cfg=importConfigCSV(ev.target.result);onImportConfig(cfg);}catch(err){alert("Import failed: "+err.message);}}
    };
    r.readAsText(f);
    e.target.value="";
  };

  const doClear=key=>{
    const opt=CLEAR_OPTS.find(o=>o.key===key);
    const msg=key==="all"
      ?"CLEAR EVERYTHING?\n\nThis deletes ALL entries AND resets ALL config to factory defaults.\n\nThis CANNOT be undone. Export a backup first."
      :`${opt.label}\n\n${opt.desc}\n\nThis cannot be undone.`;
    if(!confirm(msg))return;
    if(key==="all"){if(!confirm("FINAL CONFIRMATION — press OK to clear everything."))return;onClearAll();}
    else if(key==="entries"){if(!confirm("FINAL CONFIRMATION — delete all entries?"))return;onClearEntries();}
    else onClearConfig(key);
    setShowClear(false);
  };

  const SubBtn=({val,label,cur,set})=>(
    <button onClick={()=>set(val)} className={`tbtn${cur===val?" on":""}`} style={{fontSize:"0.72rem",padding:"4px 8px",flexShrink:0}}>{label}</button>
  );

  return(<div>
    {/* ── Section toggle ── */}
    <div style={{display:"flex",gap:5,marginBottom:10}}>
      {[["entries","📋 Entries"],["config","⚙️ Config"]].map(([k,l])=>(
        <button key={k} onClick={()=>setSection(k)} className={`tbtn${section===k?" on":""}`} style={{flex:1,fontWeight:600}}>{l}</button>
      ))}
    </div>

    {/* ── Sub-section pills ── */}
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
      {(section==="entries"?ENTRY_SUBS:CFG_SUBS).map(([k,l])=>(
        <SubBtn key={k} val={k} label={l} cur={section==="entries"?entrySub:cfgSub} set={section==="entries"?setEntrySub:setCfgSub}/>
      ))}
    </div>

    {/* ── Export ── */}
    <div className="slabel">⬇️ Export</div>
    <div className="card" style={{marginBottom:8}}>
      <div style={{fontSize:"0.76rem",color:T.textSub,marginBottom:8,lineHeight:1.5}}>
        {section==="entries"
          ?`Export ${entrySub==="all"?"all entries":entrySub+" entries"} as CSV. You can edit and re-import.`
          :`Export ${cfgSub==="all"?"all config":cfgSub+" config"} as CSV. Edit in Excel/Sheets, re-import to restore.`}
      </div>
      <button onClick={doExport} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:T.accentBtn,color:"#fff",fontFamily:"inherit",fontWeight:600,fontSize:"0.85rem",cursor:"pointer"}}>
        ⬇️ Download CSV
      </button>
    </div>

    {/* ── Import ── */}
    <div className="slabel">⬆️ Import</div>
    <div className="card" style={{marginBottom:8}}>
      <div style={{fontSize:"0.76rem",color:T.textSub,marginBottom:8,lineHeight:1.5}}>
        {section==="entries"
          ?"Import from a previously exported CSV. Duplicate IDs are skipped."
          :"Import from a previously exported config CSV. Existing lists will be replaced."}
      </div>
      <button onClick={()=>dataRef.current.click()} style={{width:"100%",padding:"10px",borderRadius:9,border:`1px solid ${T.accentBtn}`,background:"transparent",color:T.accent,fontFamily:"inherit",fontWeight:600,fontSize:"0.85rem",cursor:"pointer"}}>
        ⬆️ Select CSV file…
      </button>
      <input ref={dataRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleDataFile}/>
    </div>

    {/* ── Clear / Danger Zone ── */}
    <div style={{marginTop:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <div className="slabel" style={{marginBottom:0,color:T.danger}}>⚠️ Clear & Reset</div>
        <button onClick={()=>setShowClear(v=>!v)} style={{fontSize:"0.72rem",padding:"3px 10px",borderRadius:7,border:`1px solid ${T.danger}`,background:"transparent",color:T.danger,cursor:"pointer",fontFamily:"inherit"}}>
          {showClear?"Hide":"Show options"}
        </button>
      </div>
      {showClear&&<div className="card" style={{border:`1px solid ${T.danger}44`}}>
        {CLEAR_OPTS.map(opt=>(
          <div key={opt.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${T.border}22`}}>
            <div>
              <div style={{fontSize:"0.82rem",fontWeight:600,color:opt.danger?T.danger:T.text}}>{opt.label}</div>
              <div style={{fontSize:"0.7rem",color:T.textMuted}}>{opt.desc}</div>
            </div>
            <button onClick={()=>doClear(opt.key)} style={{flexShrink:0,marginLeft:10,padding:"5px 11px",borderRadius:8,border:`1px solid ${opt.danger?T.danger:T.border}`,background:"transparent",color:opt.danger?T.danger:T.textMuted,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:"0.75rem"}}>
              Clear
            </button>
          </div>
        ))}
      </div>}
    </div>
  </div>);
}

function MedicalPresetSetting({presets,onAdd,onRemove,onReorder,onUpdate,T}){
  const[nm,setNm]=useState("");const[ut,setUt]=useState("");
  const add=()=>{if(!nm.trim())return;onAdd(nm.trim(),ut.trim());setNm("");setUt("");};
  return(<div><div className="card" style={{marginBottom:7}}>
    <div style={{display:"flex",gap:7,marginBottom:7}}><input placeholder="Reading name…" value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/><input placeholder="Unit…" value={ut} onChange={e=>setUt(e.target.value)} style={{width:80}} onKeyDown={e=>e.key==="Enter"&&add()}/><button onClick={add} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div>

    <IconBtn name={nm2} category="medical" stored={typeof p==="object"?p.icon||"":""} onSet={ic=>onUpdate&&onUpdate(presets.map((x,j)=>j===i?{...(typeof x==="object"?x:{name:x}),icon:ic}:x))} T={T}/>
    <span style={{flex:1,marginLeft:5}}>{nm2}{ut2&&<span style={{color:T.textMuted,fontSize:"0.75rem",marginLeft:6}}>({ut2})</span>}</span>

  </div>);})}</div>);
}

        style={{width:"100%",boxSizing:"border-box",marginBottom:7,padding:"6px 8px",
          borderRadius:7,border:`1px solid ${T.border}`,background:T.cardBg,
          color:T.text,fontSize:"0.78rem",fontFamily:"inherit"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:3,maxHeight:186,overflowY:"auto",marginBottom:7}}>
        {filtered.length
          ?filtered.map(em=>(
            <button key={em} onClick={()=>{onSelect(em);onClose();}}
              title={LABELS[em]||em}
              style={{fontSize:"1.3rem",padding:"3px 4px",
                border:`2px solid ${em===current?T.accentBtn:"transparent"}`,
                borderRadius:6,cursor:"pointer",background:"transparent",lineHeight:1}}>
              {em}
            </button>
          ))
          :<span style={{fontSize:"0.75rem",color:T.textMuted,padding:"8px 4px",display:"block"}}>
            No match — paste any emoji below ↓
          </span>
        }
      </div>
      <div style={{display:"flex",gap:5,marginBottom:7,alignItems:"center"}}>
        <input value={custom} onChange={e=>setCustom(e.target.value)}
          placeholder="Paste any emoji  e.g. 🫙 🧬 🪴"
          style={{flex:1,padding:"5px 8px",borderRadius:7,
            border:`1px solid ${T.border}`,background:T.cardBg,
            color:T.text,fontSize:"1.1rem",fontFamily:"inherit"}}/>
        {customEmoji&&
          <button onClick={()=>{onSelect(customEmoji);onClose();}}
            style={{padding:"5px 11px",borderRadius:7,border:"none",
              background:T.accentBtn,color:"#fff",cursor:"pointer",
              fontSize:"0.8rem",fontFamily:"inherit",fontWeight:600,flexShrink:0}}>
            Use {customEmoji}
          </button>}
      </div>
      <div style={{display:"flex",gap:6}}>
        {current&&<button onClick={()=>{onSelect("");onClose();}}
          style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1px solid ${T.border}`,
            background:"transparent",color:T.textMuted,cursor:"pointer",
            fontSize:"0.75rem",fontFamily:"inherit"}}>
          ✕ Clear (use auto)
        </button>}
        <button onClick={onClose}
          style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1px solid ${T.border}`,
            background:"transparent",color:T.textMuted,cursor:"pointer",
            fontSize:"0.75rem",fontFamily:"inherit"}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

// Icon button that opens the picker
function IconBtn({name, category, stored, onSet, T}){
  const[open,setOpen]=React.useState(false);
  const icon=pickIcon(name,category,stored);
  return(
    <div style={{position:"relative",flexShrink:0}}>
      <button onClick={()=>setOpen(o=>!o)}
        title="Tap to change icon"
        style={{fontSize:"1.1rem",padding:"2px 5px",borderRadius:6,
          border:`1px solid ${stored?T.accentBtn:T.border}`,
          background:stored?T.accentBg:"transparent",
          cursor:"pointer",lineHeight:1,minWidth:32}}>
        {icon}
      </button>
      {open&&<EmojiPicker current={stored||""} onSelect={onSet} onClose={()=>setOpen(false)} T={T}/>}
    </div>
  );
}
function FoodSetting({items,onRemove,onUpdate,newItem,setNew,onAdd,T}){
  const[ei,setEi]=useState(null);
  const fi=foodItems(items);
  const upd=(name,patch)=>onUpdate(fi.map(f=>f.name===name?{...f,...patch}:f));
  const move=(i,dir)=>onUpdate(moveItem(fi,i,dir));
  const addSub=(name,s)=>{if(!s.trim())return;const f=fi.find(x=>x.name===name);upd(name,{subTypes:[...(f.subTypes||[]),s.trim()]});};
  const remSub=(name,s)=>{const f=fi.find(x=>x.name===name);upd(name,{subTypes:(f.subTypes||[]).filter(v=>v!==s)});};
  const moveSub=(name,i,dir)=>{const f=fi.find(x=>x.name===name);upd(name,{subTypes:moveItem(f.subTypes||[],i,dir)});};
  return(<div>
    <div className="card" style={{marginBottom:7}}>
      <div style={{display:"flex",gap:7}}>
        <input placeholder="Add food item..." value={newItem} onChange={e=>setNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
        <button onClick={onAdd} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button>
      </div>
    </div>
    {fi.map((item,i)=>(
      <div key={item.name} className="card" style={{marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <ReorderBtns i={i} total={fi.length} onMove={move} T={T}/>
          <IconBtn name={item.name} category="food" stored={item.icon||""} onSet={ic=>upd(item.name,{icon:ic})} T={T}/>
          <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{item.name}</span>
          <button className="ibtn" onClick={()=>setEi(ei===item.name?null:item.name)}>{ei===item.name?"✖️":"✏️"}</button>
          <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(item.name)}>🗑️</button>
        </div>
        <input placeholder="Default note (optional)" value={item.note||""} onChange={e=>upd(item.name,{note:e.target.value})} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:ei===item.name?6:0,color:T.textSub}}/>
        {ei===item.name&&<div style={{marginTop:5}}>
          <div className="slabel">Sub-types</div>
          {(item.subTypes||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
            <ReorderBtns i={si} total={(item.subTypes||[]).length} onMove={(idx,dir)=>moveSub(item.name,idx,dir)} T={T}/>
            <span style={{flex:1}}>{s}</span>
            <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(item.name,s)}>🗑️</button>
          </div>))}
          <AddInline placeholder="Add sub-type..." onAdd={s=>addSub(item.name,s)} T={T}/>
        </div>}
      </div>
    ))}
  </div>);
}

function DrinkSetting({types,notes,subTypes,icons,onRemove,onUpdate,onIconUpdate,newItem,setNew,onAdd,T}){
  const[ei,setEi]=useState(null);
  const drinks=(types||[]).filter(t=>t!=="--------");
  const updNote=(name,note)=>onUpdate("notes",{...notes,[name]:note});
  const updSubs=(name,subs)=>onUpdate("subTypes",{...subTypes,[name]:subs});
  const move=(i,dir)=>{const moved=moveItem(drinks,i,dir);onUpdate("types",[...moved]);};
  const addSub=(name,s)=>{if(!s.trim())return;updSubs(name,[...((subTypes||{})[name]||[]),s.trim()]);};
  const remSub=(name,s)=>updSubs(name,((subTypes||{})[name]||[]).filter(v=>v!==s));
  const moveSub=(name,i,dir)=>updSubs(name,moveItem((subTypes||{})[name]||[],i,dir));
  return(<div>
    <div className="card" style={{marginBottom:7}}>
      <div style={{display:"flex",gap:7}}>
        <input placeholder="Add drink type..." value={newItem} onChange={e=>setNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
        <button onClick={onAdd} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button>
      </div>
    </div>
    {drinks.map((name,i)=>(
      <div key={name} className="card" style={{marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <ReorderBtns i={i} total={drinks.length} onMove={move} T={T}/>
          <IconBtn name={name} category="drink" stored={(icons||{})[name]||""} onSet={ic=>onIconUpdate&&onIconUpdate(name,ic)} T={T}/>
          <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{name}</span>
          <button className="ibtn" onClick={()=>setEi(ei===name?null:name)}>{ei===name?"✖️":"✏️"}</button>
          <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(name)}>🗑️</button>
        </div>
        <input placeholder="Default note (optional)" value={(notes||{})[name]||""} onChange={e=>updNote(name,e.target.value)} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:ei===name?6:0,color:T.textSub}}/>
        {ei===name&&<div style={{marginTop:5}}>
          <div className="slabel">Sub-types</div>
          {((subTypes||{})[name]||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
            <ReorderBtns i={si} total={((subTypes||{})[name]||[]).length} onMove={(idx,dir)=>moveSub(name,idx,dir)} T={T}/>
            <span style={{flex:1}}>{s}</span>
            <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(name,s)}>🗑️</button>
          </div>))}
          <AddInline placeholder="Add sub-type..." onAdd={s=>addSub(name,s)} T={T}/>
        </div>}
      </div>
    ))}
  </div>);
}

function EList({items,onRemove,onReorder,icons,onIconUpdate,newItem,setNew,onAdd,T}){
  return(<div className="card"><div style={{display:"flex",gap:7,marginBottom:9}}><input placeholder="Add new item…" value={newItem} onChange={e=>setNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onAdd()}/><button onClick={onAdd} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div>
  {(items||[]).map((item,i)=>(<div key={item} style={{display:"flex",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${T.border}`,fontSize:"0.82rem"}}>
    {onReorder&&<ReorderBtns i={i} total={(items||[]).length} onMove={(idx,dir)=>onReorder(moveItem(items,idx,dir))} T={T}/>}
    <IconBtn name={item} category="medication" stored={(icons||{})[item]||""} onSet={ic=>onIconUpdate&&onIconUpdate(item,ic)} T={T}/>
    <span style={{flex:1,marginLeft:5}}>{item}</span>
    <button className="ibtn" style={{color:T.danger}} onClick={()=>onRemove(item)}>🗑️</button>
  </div>))}
  </div>);
}
function ExerciseSetting({types,onChange,T}){
  const[ei,setEi]=useState(null);const[nn,setNn]=useState("");
  const add=()=>{if(!nn.trim())return;onChange([...types,{name:nn.trim(),subTypes:[],metrics:["time"],note:"",icon:""}]);setNn("");};
  const rem=i=>onChange(types.filter((_,x)=>x!==i));
  const move=(i,dir)=>onChange(moveItem(types,i,dir));
  const addSub=(i,s)=>{if(!s.trim())return;onChange(types.map((t,x)=>x===i?{...t,subTypes:[...(t.subTypes||[]),s.trim()]}:t));};
  const remSub=(i,s)=>onChange(types.map((t,x)=>x===i?{...t,subTypes:t.subTypes.filter(v=>v!==s)}:t));
  const moveSub=(i,si,dir)=>onChange(types.map((t,x)=>x===i?{...t,subTypes:moveItem(t.subTypes||[],si,dir)}:t));
  const togM=(i,m)=>onChange(types.map((t,x)=>{if(x!==i)return t;const h=t.metrics.includes(m);return{...t,metrics:h?t.metrics.filter(v=>v!==m):[...t.metrics,m]};}));
  return(<div><div className="card" style={{marginBottom:7}}><div style={{display:"flex",gap:7}}><input placeholder="New exercise type…" value={nn} onChange={e=>setNn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/><button onClick={add} style={{flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div><div style={{fontSize:"0.7rem",color:T.textMuted,marginTop:5}}>New types default to time metric. Toggle below to change.</div></div>
  {types.map((t,i)=>(<div key={t.name} className="card" style={{marginBottom:7}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:5}}>
      <ReorderBtns i={i} total={types.length} onMove={move} T={T}/>
      <IconBtn name={t.name} category="exercise" stored={t.icon||""} onSet={ic=>onChange(types.map((x,j)=>j===i?{...x,icon:ic}:x))} T={T}/>
      <span style={{fontWeight:600,fontSize:"0.85rem",flex:1,marginLeft:5}}>{t.name}</span>
      <div style={{display:"flex",gap:5}}><button className="ibtn" onClick={()=>setEi(ei===i?null:i)}>{ei===i?"✖️":"✏️"}</button><button className="ibtn" style={{color:T.danger}} onClick={()=>rem(i)}>🗑️</button></div>
    </div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}>{["distance","time","count"].map(m=>(<button key={m} onClick={()=>togM(i,m)} style={{padding:"2px 9px",borderRadius:20,fontSize:"0.72rem",border:"1px solid",cursor:"pointer",borderColor:t.metrics.includes(m)?T.accentBtn:T.border,background:t.metrics.includes(m)?T.accentBg:"transparent",color:t.metrics.includes(m)?T.accent:T.textMuted}}>{m}</button>))}</div>
    <input placeholder="Default note (optional, e.g. 30 min brisk)" value={t.note||""} onChange={e=>onChange(types.map((x,j)=>j===i?{...x,note:e.target.value}:x))} style={{width:"100%",fontSize:"0.76rem",padding:"4px 7px",marginBottom:3,color:T.textSub}}/>
    {ei===i&&<div style={{marginTop:7}}><div className="slabel">Sub-types</div>
      {(t.subTypes||[]).map((s,si)=>(<div key={s} style={{display:"flex",alignItems:"center",fontSize:"0.8rem",padding:"3px 0",borderBottom:`1px solid ${T.border}`}}>
        <ReorderBtns i={si} total={(t.subTypes||[]).length} onMove={(idx,dir)=>moveSub(i,idx,dir)} T={T}/>
        <span style={{flex:1}}>{s}</span>
        <button className="ibtn" style={{color:T.danger}} onClick={()=>remSub(i,s)}>🗑️</button>
      </div>))}
      <AddInline placeholder="Add sub-type…" onAdd={s=>addSub(i,s)} T={T}/>
    </div>}
  </div>))}
  </div>);
}

function AddInline({placeholder,onAdd,T}){
  const[v,setV]=useState("");
  return(<div style={{display:"flex",gap:6,marginTop:6}}><input placeholder={placeholder} value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAdd(v);setV("");}}} style={{fontSize:"0.78rem"}}/><button onClick={()=>{onAdd(v);setV("");}} style={{flexShrink:0,padding:"5px 9px",fontSize:"0.78rem",borderRadius:8,border:"none",background:T.accentBtn,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Add</button></div>);
}
